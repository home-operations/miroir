---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: miroirvolumes.miroir.home-operations.com
spec:
  group: miroir.home-operations.com
  names:
    kind: MiroirVolume
    listKind: MiroirVolumeList
    plural: miroirvolumes
    shortNames:
    - miv
    singular: miroirvolume
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.sizeBytes
      name: Size
      type: integer
    - jsonPath: .spec.replicas[*].node
      name: Replicas
      priority: 1
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: MiroirVolume is one provisioned volume (1:1 with a PV).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              MiroirVolumeSpec is the desired state, written by the controller at
              CreateVolume time and reconciled by node agents. Replicas may be edited
              on a live replicated volume — add an entry (node + backend; the
              membership reconciler completes it) or remove one — within the bounds
              the validation rule pins: an unreplicated volume cannot grow a
              replication layer in place (internal DRBD metadata cannot be added
              under a live filesystem), and a replicated one keeps 2–3 replicas.
            properties:
              allowRemoteAccess:
                description: |-
                  AllowRemoteAccess permits pods on nodes without a replica: the PV
                  carries no node affinity, and staging on a non-replica node attaches
                  an ephemeral diskless client leg (spec.clients). From the
                  StorageClass parameter; replicated volumes only.
                type: boolean
              clients:
                description: |-
                  Clients are ephemeral diskless consumer legs, added at stage time on
                  non-replica nodes and removed at unstage. Bounded small: RWO means
                  one consumer, plus headroom for an attach/detach overlap during a
                  pod move.
                items:
                  description: |-
                    VolumeClient is an ephemeral diskless consumer leg: a DRBD peer with no
                    backing device on a node that runs a pod but holds no replica. All its
                    I/O crosses the replication network. Added by the CSI node service at
                    stage time (spec.allowRemoteAccess volumes only), completed by the
                    membership reconciler like a replica, removed at unstage. Unlike a
                    diskless tie-breaker it is not placed for quorum, and it is rendered
                    with "tiebreaker no" so DRBD never counts its vote — attach/detach
                    leaves the majority threshold alone (see README).
                  properties:
                    addedAt:
                      description: |-
                        AddedAt is when the CSI node service attached this leg. The
                        auto-diskful reconciler keys its conversion threshold on it.
                      format: date-time
                      type: string
                    address:
                      description: |-
                        Address is the replication endpoint, resolved like a replica's
                        (node-map override, else the Node's InternalIP).
                      type: string
                    node:
                      description: Node is the Kubernetes node name consuming the
                        volume remotely.
                      type: string
                    nodeID:
                      description: |-
                        NodeID is the DRBD node id, unique across replicas and clients,
                        assigned by the membership reconciler.
                      format: int32
                      type: integer
                  required:
                  - node
                  type: object
                maxItems: 2
                type: array
              drbd:
                description: DRBD is set by the controller when len(Replicas) > 1.
                properties:
                  bitmapGranularityBytes:
                    description: |-
                      BitmapGranularityBytes is the DRBD bitmap block size handed to
                      create-md (--bitmap-block-size): each dirty bit tracks this many
                      bytes, so coarser bits cut bitmap RAM proportionally at the cost of
                      resyncing more per dirty bit. Applied only when a replica's metadata
                      is first created — replicas created earlier keep their granularity
                      (DRBD exchanges bitmaps across differing block sizes). 0 means the
                      DRBD default (4096). Needs kmod ≥ 9.3.0 (the agent's startup floor).
                    enum:
                    - 0
                    - 4096
                    - 8192
                    - 16384
                    - 32768
                    - 65536
                    - 131072
                    - 262144
                    - 524288
                    - 1048576
                    format: int64
                    type: integer
                  port:
                    description: |-
                      Port is the TCP port for this resource's replication links,
                      allocated cluster-wide by the controller at creation.
                    format: int32
                    maximum: 65535
                    minimum: 1024
                    type: integer
                  sharedSecret:
                    description: |-
                      SharedSecret authenticates peers (cram-hmac-alg challenge-response):
                      without it, anything that can reach the replication port can join the
                      resource. Generated by the controller at creation; both agents render
                      the same value. DRBD caps secrets at 64 characters.
                    maxLength: 64
                    type: string
                required:
                - port
                type: object
              export:
                description: |-
                  Export, if set, serves the volume as a shared filesystem over NFS
                  (RWX). Set by the controller when the volume is created from a
                  MULTI_NODE access mode; immutable.
                properties:
                  fsType:
                    description: |-
                      FSType is the filesystem the gateway formats and mounts on the
                      device. Persisted here because mkfs happens in the gateway, which
                      never sees a CSI VolumeCapability; consumers only ever see NFS.
                    enum:
                    - ext4
                    - xfs
                    type: string
                required:
                - fsType
                type: object
              quorumPolicy:
                description: QuorumPolicy applies only when len(Replicas) > 1.
                enum:
                - last-man-standing
                - freeze
                type: string
              replicas:
                description: |-
                  Replicas lists the placement of the volume: one entry for local
                  volumes, two or more for DRBD-replicated ones. MaxItems matches the
                  CEL size rule and bounds the apiserver's CEL cost estimate — the
                  diskless transition rule is nested over this list and exceeds the
                  rule budget on an unbounded array.
                items:
                  description: |-
                    Replica is one placement of the volume's data — a DRBD peer when the
                    volume is replicated.
                  properties:
                    address:
                      description: |-
                        Address is the replication endpoint (host IP), from the node map.
                        Only set on replicated volumes.
                      type: string
                    backend:
                      description: |-
                        Backend selects how the backing device is provisioned on this node.
                        Unused for diskless tie-breaker replicas (they have no backing device).
                      enum:
                      - lvmthin
                      - zfs
                      - loopfile
                      type: string
                    diskless:
                      description: |-
                        Diskless makes this a quorum-only tie-breaker: DRBD joins for
                        voting but stores no data. No backend device, never a mount
                        target. The agent skips backend create/resize/delete and DRBD
                        create-md; the resource renders "disk none" for this peer.
                      type: boolean
                    fullSync:
                      description: |-
                        FullSync marks a replica added after volume creation: its agent
                        skips the day0 GI seed so DRBD full-syncs it from the existing
                        peers instead of treating it as a pristine twin. Set by the
                        membership reconciler when it completes the entry.
                      type: boolean
                    node:
                      description: Node is the Kubernetes node name hosting this replica.
                      type: string
                    nodeID:
                      description: |-
                        NodeID is the DRBD node id, assigned by the controller at creation
                        and stable for the volume's lifetime. Only set on replicated volumes.
                      format: int32
                      type: integer
                  required:
                  - node
                  type: object
                maxItems: 3
                minItems: 1
                type: array
              sizeBytes:
                description: |-
                  SizeBytes is the provisioned (virtual, thin) size of the volume.
                  The transition rule pins it monotonic: nothing downstream supports
                  shrinking — agents only grow the backing device and the filesystem,
                  and a shrunk spec would desync DRBD metadata from the device.
                format: int64
                minimum: 1
                type: integer
                x-kubernetes-validations:
                - message: 'a volume cannot shrink in place: agents only grow the
                    backing device and filesystem; restore a snapshot into a new,
                    smaller volume instead'
                  rule: self >= oldSelf
              source:
                description: Source, if set, provisions content from a snapshot (CoW
                  clone).
                properties:
                  snapshotName:
                    description: SnapshotName references a MiroirSnapshot by name.
                    type: string
                required:
                - snapshotName
                type: object
            required:
            - replicas
            - sizeBytes
            type: object
            x-kubernetes-validations:
            - message: replicated volumes (spec.drbd set) need 2-3 replicas; unreplicated
                exactly 1
              rule: 'has(self.drbd) ? (size(self.replicas) >= 2 && size(self.replicas)
                <= 3) : size(self.replicas) == 1'
            - message: replicated volumes need at least 2 diskful (non-diskless) replicas
              rule: 'has(self.drbd) ? size(self.replicas.filter(r, !has(r.diskless)
                || !r.diskless)) >= 2 : true'
            - message: diskless replicas are only valid on replicated volumes
              rule: '!has(self.drbd) ? !self.replicas.exists(r, has(r.diskless) &&
                r.diskless) : true'
            - message: the first replica must be diskful (not a diskless tie-breaker)
              rule: 'size(self.replicas) > 0 ? !has(self.replicas[0].diskless) ||
                !self.replicas[0].diskless : true'
            - message: 'a diskful replica cannot become diskless in place; remove
                the replica and re-add it instead (diskless→diskful is allowed: the
                agent attaches a disk to the live leg)'
              rule: self.replicas.all(r, oldSelf.replicas.all(o, o.node != r.node
                || (has(o.diskless) && o.diskless) || !(has(r.diskless) && r.diskless)))
            - message: a volume cannot gain or lose its replication layer in place
              rule: has(self.drbd) == has(oldSelf.drbd)
            - message: client legs are only valid on replicated volumes
              rule: '!has(self.clients) || has(self.drbd)'
            - message: a client leg cannot share a node with a replica
              rule: '!has(self.clients) || self.clients.all(c, !self.replicas.exists(r,
                r.node == c.node))'
            - message: an NFS-exported (RWX) volume is consumed over NFS and cannot
                have DRBD client legs
              rule: '!has(self.clients) || !has(self.export)'
            - message: a volume cannot gain or lose its NFS export (RWX) in place
              rule: has(self.export) == has(oldSelf.export)
            - message: replicated RWX volumes must use freeze quorum (a rescheduled
                gateway under last-man-standing risks dual-primary split-brain)
              rule: '!(has(self.export) && has(self.drbd)) || self.quorumPolicy ==
                ''freeze'''
            - message: 'replica nodes must be unique: a node holds at most one leg
                of a volume'
              rule: self.replicas.all(r, self.replicas.exists_one(o, o.node == r.node))
            - message: client-leg nodes must be unique
              rule: '!has(self.clients) || self.clients.all(c, self.clients.exists_one(o,
                o.node == c.node))'
            - message: 'drbd.port is immutable: it was allocated cluster-wide at creation
                and the allocator assumes existing volumes keep their ports'
              rule: '!has(self.drbd) || !has(oldSelf.drbd) || self.drbd.port == oldSelf.drbd.port'
            - message: 'source is immutable: it records the snapshot this volume was
                cloned from'
              rule: has(self.source) == has(oldSelf.source) && (!has(self.source)
                || !has(oldSelf.source) || self.source.snapshotName == oldSelf.source.snapshotName)
            - message: 'export.fsType is immutable: the gateway formatted the volume
                with it at first start'
              rule: '!has(self.export) || !has(oldSelf.export) || self.export.fsType
                == oldSelf.export.fsType'
          status:
            description: MiroirVolumeStatus is the observed state aggregated from
              node agents.
            properties:
              activated:
                description: |-
                  Activated is set the first time any node successfully stages the
                  volume for a consumer (filesystem or raw block). It latches "this
                  volume may hold data": split-brain auto-recovery, which discards one
                  leg's generation, runs only while this is false — on an activated
                  volume divergence is never auto-resolved. Broader than Formatted,
                  which a raw-block volume never sets.
                type: boolean
              conditions:
                description: Conditions follow the standard Kubernetes condition conventions.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              export:
                description: |-
                  Export is the observed state of the NFS gateway, set only on RWX
                  volumes (spec.export). Written by the export reconciler.
                properties:
                  address:
                    description: |-
                      Address is the share Service's ClusterIP. Consumers mount
                      <address>:/<volume> over NFS. Empty until the reconciler has
                      created the Service and read back its allocated ClusterIP.
                    type: string
                type: object
              formatted:
                description: |-
                  Formatted is set once the volume has ever carried a filesystem —
                  first mkfs at stage time, or inherited from the snapshot source on
                  restore. A blank device on a formatted volume is data loss: the
                  node refuses to mkfs again rather than silently wipe it.
                type: boolean
              perNode:
                additionalProperties:
                  description: ReplicaStatus is the per-node observed state, written
                    by that node's agent.
                  properties:
                    connected:
                      description: |-
                        Connected is true when this node's replication links to every
                        diskful peer are established. A diskless tie-breaker's link state
                        is deliberately excluded: it holds no data leg, so its downtime
                        must not read as degraded replication (it would block snapshots
                        and replica removal). Always true for unreplicated volumes.
                      type: boolean
                    deviceCreated:
                      description: DeviceCreated is true once the backing device exists
                        on the node.
                      type: boolean
                    devicePath:
                      description: |-
                        DevicePath is the node-local path pods attach to (backing device for
                        replicas:1; /dev/drbd<minor> when replicated).
                      type: string
                    discardGranularityBytes:
                      description: |-
                        DiscardGranularityBytes is the discard granularity this diskful
                        leg probed from its backing device (0: unsupported or unprobed).
                        Client legs advertise the max over the diskful legs' values, so
                        trims from remote consumers align with the real backings instead
                        of the 512-byte default DRBD assumes for diskless devices.
                      format: int64
                      type: integer
                    diskFailed:
                      description: |-
                        DiskFailed latches a diskful leg DRBD detached after a backing I/O
                        error (on-io-error detach): the agent renders `adjust --skip-disk`
                        so the next reconcile does not re-attach the failing disk and
                        re-trigger the error. Sticky until the replica is removed and
                        re-added (a fresh backing clears it). Serving continues via the peer.
                      type: boolean
                    diskState:
                      description: |-
                        DiskState is the DRBD disk state on this node (UpToDate,
                        Inconsistent, Outdated, Diskless, …). Empty for unreplicated volumes.
                      type: string
                    diskless:
                      description: |-
                        Diskless records that this node's replica is a quorum-only
                        tie-breaker. Self-reported by the agent so removal handling still
                        knows after the entry has left spec.replicas.
                      type: boolean
                    drbdMinor:
                      description: |-
                        DRBDMinor is the DRBD device minor assigned locally by the agent.
                        Zero means unassigned (fresh volume or unreplicated).
                      format: int32
                      type: integer
                    lastVerifyOutOfSyncBytes:
                      description: |-
                        LastVerifyOutOfSyncBytes is the out-of-sync total the last verify
                        found (0 = clean). Findings need a disconnect/connect cycle to resync;
                        they persist in the out-of-sync metric until then. A pointer so a
                        clean verify (0) reads differently from "never verified" (nil).
                      format: int64
                      type: integer
                    lastVerifyTime:
                      description: |-
                        LastVerifyTime is when the last scheduled online verify completed for
                        this volume. Only the coordinator (first diskful replica) initiates a
                        verify, so only its slot carries this.
                      format: date-time
                      type: string
                    message:
                      description: Message carries the last reconcile error, if any.
                      type: string
                    primarySince:
                      description: |-
                        PrimarySince is when this node's leg last became DRBD Primary (a
                        consumer holds the device open); cleared on demotion. Maintained by
                        the agent from the kernel role, so it survives unstage bookkeeping
                        being skipped (force-killed pods). The auto-diskful reconciler keys
                        tie-breaker conversion on its age.
                      format: date-time
                      type: string
                    sizeBytes:
                      description: |-
                        SizeBytes is the currently realized size on this node, used to
                        acknowledge expansion.
                      format: int64
                      type: integer
                    splitBrain:
                      description: |-
                        SplitBrain is true when this node's DRBD refused a reconnect after
                        detecting divergent data — operator intervention required.
                      type: boolean
                  required:
                  - deviceCreated
                  type: object
                description: PerNode maps node name to that agent's observed state.
                type: object
              phase:
                description: Phase summarizes the volume state for the controller
                  and humans.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
