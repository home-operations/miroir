# Helm values for the single-node kind e2e (mise run test-e2e). `nodes` is
# injected with --set by the e2e-provision task (the node name and loop device
# path are only known after the cluster is up). Local backend only — kind has
# no DRBD, so the replicated class is omitted.
image:
  repository: miroir-controller
  tag: e2e
  pullPolicy: IfNotPresent

agent:
  image:
    repository: miroir-agent
    tag: e2e
    pullPolicy: IfNotPresent

# Local backend only — kind has no DRBD, so no replicated class. Default
# class so a PVC with no storageClassName still resolves to miroir.
storageClasses:
  - name: miroir-local
    replicas: 1
    isDefault: true
    fsType: ext4
    reclaimPolicy: Delete

volumeSnapshotClass:
  create: true
  name: miroir-snap
  deletionPolicy: Delete
