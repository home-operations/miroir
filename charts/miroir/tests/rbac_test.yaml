suite: test rbac
templates:
  - rbac.tpl
release:
  name: miroir
  namespace: miroir-system
tests:
  - it: emits controller + agent + gateway RBAC (SAs, cluster roles, and the namespaced gateway Role)
    asserts:
      - hasDocuments:
          count: 11
      - documentIndex: 0
        equal:
          path: kind
          value: ServiceAccount
      - documentIndex: 1
        equal:
          path: kind
          value: ServiceAccount
      - documentIndex: 2
        equal:
          path: kind
          value: ClusterRole
      - documentIndex: 3
        equal:
          path: kind
          value: ClusterRoleBinding
      - documentIndex: 4
        equal:
          path: kind
          value: ClusterRole
      - documentIndex: 5
        equal:
          path: kind
          value: ClusterRoleBinding
      # Gateway RBAC: the controller's namespaced Role to manage gateway
      # workloads, then the gateway SA + cluster role for volume access.
      - documentIndex: 6
        equal:
          path: kind
          value: Role
      - documentIndex: 7
        equal:
          path: kind
          value: RoleBinding
      - documentIndex: 8
        equal:
          path: kind
          value: ServiceAccount
      - documentIndex: 9
        equal:
          path: kind
          value: ClusterRole
      - documentIndex: 10
        equal:
          path: kind
          value: ClusterRoleBinding

  - it: places both ServiceAccounts in the Release namespace
    asserts:
      - documentIndex: 0
        equal:
          path: metadata.namespace
          value: miroir-system
      - documentIndex: 1
        equal:
          path: metadata.namespace
          value: miroir-system

  - it: controller ClusterRole grants full CRUD on miroir CRDs
    documentIndex: 2
    asserts:
      - contains:
          any: true
          path: rules
          content:
            apiGroups: ["miroir.home-operations.com"]
            resources: ["miroirvolumes", "miroirsnapshots"]
            verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
      - contains:
          any: true
          path: rules
          content:
            apiGroups: ["snapshot.storage.k8s.io"]
            resources: ["volumesnapshotclasses", "volumesnapshots"]
            verbs: ["get", "list", "watch"]
      - contains:
          any: true
          path: rules
          content:
            apiGroups: [""]
            resources: ["persistentvolumes"]
            verbs: ["get", "list", "watch", "create", "delete", "patch"]
      # The controller patches miroirvolumes/status to record the Formatted
      # flag on a restored (clone-from-snapshot) volume.
      - contains:
          any: true
          path: rules
          content:
            apiGroups: ["miroir.home-operations.com"]
            resources: ["miroirvolumes/status", "miroirsnapshots/status"]
            verbs: ["get", "update", "patch"]

  - it: agent ClusterRole only updates mirror CRDs and patches their status
    documentIndex: 4
    asserts:
      - contains:
          any: true
          path: rules
          content:
            apiGroups: ["miroir.home-operations.com"]
            resources: ["miroirvolumes", "miroirsnapshots"]
            verbs: ["get", "list", "watch", "update"]
      - contains:
          any: true
          path: rules
          content:
            apiGroups: ["miroir.home-operations.com"]
            resources: ["miroirvolumes/status", "miroirsnapshots/status"]
            verbs: ["get", "patch"]
      # reads its own Node's cordon state to gate DRBD shutdown teardown
      - contains:
          any: true
          path: rules
          content:
            apiGroups: [""]
            resources: ["nodes"]
            verbs: ["get", "list", "watch"]

  - it: grants Lease access only when leader election is on
    documentIndex: 2
    asserts:
      - notContains:
          any: true
          path: rules
          content:
            apiGroups: ["coordination.k8s.io"]
            resources: ["leases"]
            verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  - it: replicaCount above 1 grants the controller Lease CRUD for leader election
    set:
      replicaCount: 2
    documentIndex: 2
    asserts:
      - contains:
          any: true
          path: rules
          content:
            apiGroups: ["coordination.k8s.io"]
            resources: ["leases"]
            verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  - it: controller ClusterRoleBinding binds to miroir-controller ServiceAccount
    documentIndex: 3
    asserts:
      - equal:
          path: kind
          value: ClusterRoleBinding
      - equal:
          path: roleRef.kind
          value: ClusterRole
      - equal:
          path: roleRef.name
          value: miroir-controller
      - equal:
          path: subjects[0].kind
          value: ServiceAccount
      - equal:
          path: subjects[0].name
          value: miroir-controller
      - equal:
          path: subjects[0].namespace
          value: miroir-system

  - it: agent ClusterRoleBinding binds to miroir-agent ServiceAccount
    documentIndex: 5
    asserts:
      - equal:
          path: kind
          value: ClusterRoleBinding
      - equal:
          path: roleRef.kind
          value: ClusterRole
      - equal:
          path: roleRef.name
          value: miroir-agent
      - equal:
          path: subjects[0].kind
          value: ServiceAccount
      - equal:
          path: subjects[0].name
          value: miroir-agent
      - equal:
          path: subjects[0].namespace
          value: miroir-system
