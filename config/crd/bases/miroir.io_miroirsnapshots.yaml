---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: miroirsnapshots.miroir.io
spec:
  group: miroir.io
  names:
    kind: MiroirSnapshot
    listKind: MiroirSnapshotList
    plural: miroirsnapshots
    shortNames:
      - mis
    singular: miroirsnapshot
  scope: Cluster
  versions:
    - additionalPrinterColumns:
        - jsonPath: .spec.volumeName
          name: Volume
          type: string
        - jsonPath: .status.readyToUse
          name: Ready
          type: boolean
        - jsonPath: .metadata.creationTimestamp
          name: Age
          type: date
      name: v1alpha1
      schema:
        openAPIV3Schema:
          description: |-
            MiroirSnapshot is one crash-consistent point-in-time snapshot of a
            MiroirVolume (1:1 with a VolumeSnapshotContent).
          properties:
            apiVersion:
              description: |-
                APIVersion defines the versioned schema of this representation of an object.
                Servers should convert recognized schemas to the latest internal value, and
                may reject unrecognized values.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
              type: string
            kind:
              description: |-
                Kind is a string value representing the REST resource this object represents.
                Servers may infer this from the endpoint the client submits requests to.
                Cannot be updated.
                In CamelCase.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
              type: string
            metadata:
              type: object
            spec:
              description: |-
                MiroirSnapshotSpec is the desired state, created by the controller on
                CSI CreateSnapshot.
              properties:
                volumeName:
                  description: VolumeName references the MiroirVolume this snapshot
                    captures.
                  type: string
              required:
                - volumeName
              type: object
            status:
              description: |-
                MiroirSnapshotStatus is the observed state aggregated from node agents.
                The snapshot exists as a backend CoW snapshot on every replica of the
                source volume (DESIGN.md §4.5.4).
              properties:
                conditions:
                  description: Conditions follow the standard Kubernetes condition conventions.
                  items:
                    description: Condition contains details for one aspect of the current
                      state of this API Resource.
                    properties:
                      lastTransitionTime:
                        description: |-
                          lastTransitionTime is the last time the condition transitioned from one status to another.
                          This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                        format: date-time
                        type: string
                      message:
                        description: |-
                          message is a human readable message indicating details about the transition.
                          This may be an empty string.
                        maxLength: 32768
                        type: string
                      observedGeneration:
                        description: |-
                          observedGeneration represents the .metadata.generation that the condition was set based upon.
                          For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                          with respect to the current state of the instance.
                        format: int64
                        minimum: 0
                        type: integer
                      reason:
                        description: |-
                          reason contains a programmatic identifier indicating the reason for the condition's last transition.
                          Producers of specific condition types may define expected values and meanings for this field,
                          and whether the values are considered a guaranteed API.
                          The value should be a CamelCase string.
                          This field may not be empty.
                        maxLength: 1024
                        minLength: 1
                        pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                        type: string
                      status:
                        description: status of the condition, one of True, False, Unknown.
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                        type: string
                      type:
                        description: type of condition in CamelCase or in foo.example.com/CamelCase.
                        maxLength: 316
                        pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                        type: string
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    type: object
                  type: array
                ioSuspended:
                  description: |-
                    IOSuspended is the replicated-snapshot write barrier: set by the
                    coordinator after suspend-io, cleared on resume. Peers snapshot
                    only while it holds.
                  type: boolean
                perNode:
                  additionalProperties:
                    description: SnapshotNodeState tracks one node's progress through
                      the snapshot barrier.
                    type: string
                  description: PerNode maps node name to that agent's snapshot progress.
                  type: object
                readyToUse:
                  description: ReadyToUse is true once every replica holds the snapshot.
                  type: boolean
                sizeBytes:
                  description: |-
                    SizeBytes is the virtual size of the snapshotted volume, used by
                    the CSI layer to size restored volumes.
                  format: int64
                  type: integer
                sourceFormatted:
                  description: |-
                    SourceFormatted records the source volume's Formatted flag when
                    the snapshot is cut. Restored volumes inherit it so their first
                    stage never reformats a clone that should carry a filesystem.
                  type: boolean
                suspendedAt:
                  description: |-
                    SuspendedAt bounds the barrier: the coordinator resumes IO at the
                    deadline even if a peer never snapshots.
                  format: date-time
                  type: string
              type: object
          required:
            - spec
          type: object
      served: true
      storage: true
      subresources:
        status: {}
