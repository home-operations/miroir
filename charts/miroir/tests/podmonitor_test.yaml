suite: podmonitor
templates:
  - podmonitor.tpl
release:
  name: miroir
  namespace: miroir-system
tests:
  - it: should not create a PodMonitor by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should create a PodMonitor when enabled
    set:
      monitoring.podMonitor.enabled: true
    asserts:
      - isKind:
          of: PodMonitor
      - equal:
          path: metadata.name
          value: miroir
      - equal:
          path: metadata.namespace
          value: miroir-system

  - it: should select both the controller and agent pods on the metrics port
    set:
      monitoring.podMonitor.enabled: true
    asserts:
      - equal:
          path: spec.selector.matchExpressions[0].key
          value: app.kubernetes.io/component
      - equal:
          path: spec.selector.matchExpressions[0].values
          value: [controller, agent]
      - equal:
          path: spec.podMetricsEndpoints[0].port
          value: metrics
      - equal:
          path: spec.podMetricsEndpoints[0].path
          value: /metrics
      - equal:
          path: spec.podMetricsEndpoints[0].interval
          value: 30s
      - equal:
          path: spec.podMetricsEndpoints[0].scrapeTimeout
          value: 10s

  - it: should always relabel the pod node name onto a node label
    set:
      monitoring.podMonitor.enabled: true
    asserts:
      - equal:
          path: spec.podMetricsEndpoints[0].relabelings[0].sourceLabels
          value: [__meta_kubernetes_pod_node_name]
      - equal:
          path: spec.podMetricsEndpoints[0].relabelings[0].targetLabel
          value: node

  - it: should append user relabelings after the node relabeling
    set:
      monitoring.podMonitor.enabled: true
      monitoring.podMonitor.relabelings:
        - action: drop
          sourceLabels: [__meta_kubernetes_pod_label_foo]
    asserts:
      - equal:
          path: spec.podMetricsEndpoints[0].relabelings[1].action
          value: drop

  - it: should use a custom scrape interval
    set:
      monitoring.podMonitor.enabled: true
      monitoring.podMonitor.interval: 15s
    asserts:
      - equal:
          path: spec.podMetricsEndpoints[0].interval
          value: 15s

  - it: should add extra labels to the PodMonitor
    set:
      monitoring.podMonitor.enabled: true
      monitoring.podMonitor.labels:
        prometheus: kube-prometheus
    asserts:
      - equal:
          path: metadata.labels.prometheus
          value: kube-prometheus
