suite: test miroirnode
templates:
  - miroirnode.tpl
release:
  name: miroir
  namespace: miroir-system
tests:
  - it: renders nothing by default (the chart is à la carte)
    asserts:
      - hasDocuments:
          count: 0

  - it: fails with a migration pointer on pre-0.11 values (no spec wrapper)
    set:
      nodes:
        node-a:
          pools:
            default:
              device: /dev/disk/by-partlabel/r-miroir
    asserts:
      - failedTemplate:
          errorMessagePattern: "nodes.node-a: the node must be declared under `spec:`"

  - it: fails with the migration pointer on a null node entry (no raw nil-pointer error)
    set:
      nodes:
        node-a:
    asserts:
      - failedTemplate:
          errorMessagePattern: "nodes.node-a: the node must be declared under `spec:`"

  - it: fails on an unknown spec field instead of letting the API server prune it
    set:
      nodes:
        node-a:
          spec:
            zne: rack-1
            pools:
              - name: default
                lvmthin: {}
    asserts:
      - failedTemplate:
          errorMessage: "nodes.node-a.spec.zne: unknown field (the API server would silently drop it); valid fields: zone, address, autoEvict, pools"

  - it: fails on an unknown pool field
    set:
      nodes:
        node-a:
          spec:
            pools:
              - name: default
                lvmthin: {}
                device: /dev/sdb
    asserts:
      - failedTemplate:
          errorMessage: "nodes.node-a.spec.pools[0].device: unknown field (the API server would silently drop it); valid fields: name, lvmthin, zfs, loopfile"

  - it: fails on an unknown backend-block field (the 0.10 thinPoolSize spelling)
    set:
      nodes:
        node-a:
          spec:
            pools:
              - name: default
                lvmthin:
                  device: /dev/sdb
                  thinPoolSize: 400g
    asserts:
      - failedTemplate:
          errorMessage: "nodes.node-a.spec.pools[0].lvmthin.thinPoolSize: unknown field (the API server would silently drop it); valid fields: device, poolSize"

  - it: renders one cluster-scoped MiroirNode per entry, spec verbatim
    set:
      nodes:
        node-a:
          spec:
            zone: rack-1
            address: 10.0.100.11
            pools:
              - name: default
                lvmthin:
                  device: /dev/disk/by-partlabel/r-miroir
                  poolSize: 400g
        node-b:
          spec:
            pools:
              - name: default
                zfs:
                  dataset: data-pool/miroir
                  volBlockSize: 16K
                  compression: inherit
    asserts:
      - hasDocuments:
          count: 2
      - documentIndex: 0
        equal:
          path: kind
          value: MiroirNode
      - documentIndex: 0
        equal:
          path: apiVersion
          value: miroir.home-operations.com/v1alpha1
      - documentIndex: 0
        equal:
          path: metadata.name
          value: node-a
      # Cluster-scoped: no namespace on the object.
      - documentIndex: 0
        notExists:
          path: metadata.namespace
      - documentIndex: 0
        equal:
          path: spec.zone
          value: rack-1
      - documentIndex: 0
        equal:
          path: spec.address
          value: 10.0.100.11
      - documentIndex: 0
        equal:
          path: spec.pools[0].name
          value: default
      - documentIndex: 0
        notExists:
          path: spec.pools[0].backend
      - documentIndex: 0
        equal:
          path: spec.pools[0].lvmthin.device
          value: /dev/disk/by-partlabel/r-miroir
      - documentIndex: 0
        equal:
          path: spec.pools[0].lvmthin.poolSize
          value: 400g
      - documentIndex: 1
        equal:
          path: metadata.name
          value: node-b
      - documentIndex: 1
        equal:
          path: spec.pools[0].zfs.dataset
          value: data-pool/miroir
      - documentIndex: 1
        equal:
          path: spec.pools[0].zfs.volBlockSize
          value: 16K
      - documentIndex: 1
        equal:
          path: spec.pools[0].zfs.compression
          value: inherit

  - it: passes optional spec fields through untouched (the CRD validates values)
    set:
      nodes:
        node-a:
          spec:
            autoEvict: false
            pools:
              - name: default
                loopfile:
                  baseDir: /var/lib/miroir
    asserts:
      - documentIndex: 0
        equal:
          path: spec.autoEvict
          value: false
      - documentIndex: 0
        equal:
          path: spec.pools[0].loopfile.baseDir
          value: /var/lib/miroir

  - it: labels the objects for release ownership
    set:
      nodes:
        node-a:
          spec:
            pools:
              - name: default
                lvmthin: {}
    asserts:
      - documentIndex: 0
        equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
      - documentIndex: 0
        equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: miroir

  - it: keeps rendered MiroirNodes on uninstall (resource-policy keep)
    set:
      nodes:
        node-a:
          spec:
            pools:
              - name: default
                lvmthin: {}
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/resource-policy"]
          value: keep
