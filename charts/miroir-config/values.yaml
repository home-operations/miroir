# -- Labels stamped on every rendered object.
commonLabels: {}

# =============================================================================
# Storage topology
# =============================================================================
# Per-node storage topology — one MiroirNode custom resource per entry:
# each node's `spec` below IS the MiroirNode spec, passed through verbatim,
# and the MiroirNode CRD (installed by the miroir chart) is what validates
# it — see `kubectl explain miroirnode.spec` for the full reference. The
# controller places replicas from these objects and each node's agent
# reads its own for backend selection (and restarts itself when the pool
# spec changes).
#
# Each node declares named storage `pools` (StorageClasses select one via
# their `pool` knob; classes that name none use the pool called
# "default"). A pool name identifies the same tier across nodes — a
# 2-replica volume in pool `fast` needs a `fast` pool on 2 nodes. The
# backend is the configuration block a pool carries: exactly one of
# `lvmthin`, `zfs`, or `loopfile`, even when it has nothing to say
# (`lvmthin: {}` when the VG already exists).
#
# Rendered MiroirNodes carry helm.sh/resource-policy: keep — uninstalling
# this chart (or dropping an entry) never deletes the topology under live
# volumes; decommissioning a node is an explicit `kubectl delete
# miroirnode <name>`.
# nodes:
#   kharkiv:
#     spec:
#       # zone: rack-1         # spread replicas across failure domains
#       # address: 10.0.100.11 # replicate over a dedicated storage NIC
#       # autoEvict: false     # never re-place this node's legs (autoEvictAfter)
#       pools:
#         - name: default
#           lvmthin:
#             device: /dev/disk/by-partlabel/r-miroir
#             # poolSize: 400g   # bound the pool when sharing the VG
#         - name: fast           # a second tier on another disk
#           lvmthin:
#             device: /dev/disk/by-id/nvme-Micron_7450_XXXX
#   paris:
#     spec:
#       # zone: rack-2
#       pools:
#         - name: default
#           zfs:
#             dataset: data-pool/miroir
#             # volBlockSize: 4K  # powers of two from 4K through 128K
#             # compression: lz4  # use inherit for the parent dataset policy
#   le-havre:
#     spec:
#       pools:
#         - name: default
#           # loopfile: sparse files on the node's existing filesystem — no
#           # dedicated disk or pool. baseDir must be reflink-capable (XFS
#           # reflink=1, e.g. Talos /var, or btrfs) for CoW snapshots; the
#           # agent refuses to start otherwise. List every baseDir in the
#           # miroir chart's agent.loopfileBaseDirs so the agent mounts it.
#           loopfile:
#             baseDir: /var/lib/miroir
nodes: {}

# Node groups materialize one MiroirNode per label-matched node, so a
# fleet sharing a storage layout (a device-path convention, a common ZFS
# dataset) is ONE entry and joining it is labeling the node. `template`
# is the MiroirNode spec (same shape as nodes.<name>.spec above), with
# two per-node facts resolved from the Node object: an empty zone
# inherits the node's topology.kubernetes.io/zone label, and the
# replication address comes from a miroir.home-operations.com/address
# annotation on the Node (never the template). Direct `nodes` entries
# and hand-authored MiroirNodes always win over groups, and a node
# leaving the selector orphans its MiroirNode in place — decommissioning
# a member is unlabeling its node first, then the explicit
# `kubectl delete miroirnode <name>` (deleting while the node still
# matches just makes the group recreate it).
# nodeGroups:
#   workers:
#     spec:
#       nodeSelector:
#         matchLabels:
#           storage.miroir.home-operations.com/class: nvme
#       template:
#         pools:
#           - name: default
#             lvmthin:
#               device: /dev/disk/by-partlabel/r-miroir
nodeGroups: {}

# =============================================================================
# Storage classes
# =============================================================================
# @schema
# type: array
# items:
#   type: object
#   required: [name]
# @schema
# -- StorageClasses to create. Empty by default: declare the classes you
# want. One local + one replicated is the common pair (see the example
# below). Per entry:
#   name          (required) the StorageClass name
#   replicas      replica count, default 1; >1 makes it DRBD-replicated
#   quorum        freeze or last-man-standing (replicated only, default
#                 freeze). freeze never diverges but halts writes without a
#                 peer majority; last-man-standing keeps the survivor
#                 writable at the risk of split-brain. See the root README,
#                 "Replication and quorum".
#   fsType        ext4 or xfs, default ext4
#   pool          named storage pool the class provisions from, default
#                 "default". Every replica of a volume lands in this pool
#                 on its node, so the pool must exist (in the MiroirNode
#                 specs) on at least `replicas` nodes.
#   allowRemoteVolumeAccess
#                 true or false (replicated only; the controller defaults
#                 absent to true, matching LINSTOR): pods on nodes without
#                 a replica consume the volume through an ephemeral
#                 diskless DRBD leg at replication-network speed. Set
#                 false to pin pods to replica nodes for local reads. See
#                 the root README, "Remote consumers".
#   bitmapGranularity
#                 DRBD bitmap block size in bytes (replicated only): a
#                 power of two, 4096–1048576, default absent (DRBD's 4096).
#                 Each dirty bit tracks this many bytes — coarser cuts
#                 bitmap RAM proportionally (65536 ≈ 1/16th) but resyncs
#                 more per dirty bit; worth considering for classes holding
#                 large volumes. Fixed when a replica's metadata is
#                 created: changing the class affects new volumes only.
#   reclaimPolicy Delete or Retain, default Delete
#   isDefault     set the cluster default-class annotation, default false
#   volumeBindingMode
#                 WaitForFirstConsumer (default) delays provisioning until a
#                 pod schedules, so placement can prefer that pod's node;
#                 Immediate provisions on PVC creation — reasonable for a
#                 replicated class consumed remotely.
#   mountOptions  mount options for the class's PVs (list of strings)
#   annotations   extra annotations on the StorageClass
#   labels        extra labels on the StorageClass
# Example (coexisting with OpenEBS, which stays the cluster default):
#   storageClasses:
#     - name: miroir-local
#       replicas: 1
#     - name: miroir-replicated
#       replicas: 2
#       quorum: freeze
storageClasses: []

# Requires the cluster-wide snapshot-controller + CRDs (deployed
# separately; kube-system/snapshot-controller in the homelab).
# @schema
# type: array
# items:
#   type: object
#   required: [name]
# @schema
# -- VolumeSnapshotClasses to create (requires the snapshot-controller +
# CRDs, deployed separately). Empty by default. Per entry:
#   name           (required) the VolumeSnapshotClass name
#   deletionPolicy Delete or Retain, default Delete
#   isDefault      set the cluster default-snapshot-class annotation,
#                  default false
#   annotations    extra annotations on the VolumeSnapshotClass
#   labels         extra labels on the VolumeSnapshotClass
# Example:
#   volumeSnapshotClasses:
#     - name: miroir-snap
#       deletionPolicy: Delete
volumeSnapshotClasses: []
