image:
  repository: ghcr.io/eleboucher/homefs
  # Every main push publishes :main (and the 0.0.0-main chart); releases
  # publish immutable version tags.
  tag: main
  pullPolicy: IfNotPresent

sidecars:
  provisioner:
    image: registry.k8s.io/sig-storage/csi-provisioner:v6.2.0
    # LVM/ZFS provisioning on a cold node can exceed the 10s sidecar
    # default; the driver returns DeadlineExceeded and the provisioner
    # retries, but a roomier timeout avoids churn.
    timeout: 120s
  registrar:
    image: registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.17.0

kubeletDir: /var/lib/kubelet

# Per-node storage topology — the single source of truth for which nodes
# hold volumes and how. Rendered into the homefs-nodes ConfigMap, read by
# the controller (placement) and each agent (backend selection).
# nodes:
#   kharkiv:
#     backend: lvmthin
#     device: /dev/disk/by-partlabel/r-homefs
#     # thinPoolSize: 400g   # bound the pool when sharing the VG
#   paris:
#     backend: zfs
#     zfsDataset: data-pool/homefs
nodes: {}

controller:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 128Mi

agent:
  # Per-node backend selection comes from node annotations:
  #   homefs.io/backend: lvmthin | zfs
  #   homefs.io/device: /dev/disk/by-partlabel/r-homefs   (lvmthin)
  #   homefs.io/zfs-dataset: data-pool/homefs              (zfs)
  # Nodes also need the label homefs.io/storage: "true" to receive replicas.
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 128Mi

storageClass:
  create: true
  name: homefs-local
  # Coexists with OpenEBS: openebs-zfs stays the cluster default.
  isDefault: false
  fsType: ext4
  replicas: 1
  reclaimPolicy: Delete

replicatedStorageClass:
  create: true
  name: homefs-replicated
  isDefault: false
  fsType: ext4
  quorum: last-man-standing # | freeze
  reclaimPolicy: Delete
