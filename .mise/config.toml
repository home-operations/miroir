[tools]
go = "1.26.5"
golangci-lint = "2.12.2"
helm = "4.2.3"
cosign = "3.1.1"
helm-docs = "1.14.2"
jq = "1.8.2"
kind = "0.32.0"
kube-controller-tools = "0.21.0"
kubectl = "1.36.2"
lefthook = "2.1.10"
oxfmt = "0.58.0"
setup-envtest = "0.24.1"
zizmor = "1.26.1"
"aqua:dadav/helm-schema" = "0.23.4"
yq = "4.53.3"

[tasks.manifests]
description = "Generate CRD and RBAC manifests"
run = "controller-gen rbac:roleName=miroir-controller crd paths='./...' output:crd:artifacts:config=config/crd/bases"

[tasks.generate]
description = "Generate DeepCopy methods and apply configurations"
run = [
  "controller-gen object:headerFile=hack/boilerplate.go.txt paths='./...'",
  "controller-gen applyconfiguration:headerFile=hack/boilerplate.go.txt paths='./api/...'",
]

[tasks.fmt]
description = "Run go fmt against code"
run = "go fmt ./..."

[tasks.vet]
description = "Run go vet against code"
run = "go vet ./..."

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run"

[tasks.lint-fix]
description = "Run golangci-lint with --fix"
run = "golangci-lint run --fix"

[tasks.helm-lint]
description = "Run helm lint"
run = "helm lint charts/miroir"

[tasks.helm-test]
description = "Run helm-unittest against the chart templates"
run = "helm unittest charts/miroir"

[tasks.helm-docs-check]
description = "Verify chart README + values.schema.json are in sync with values.yaml"
run = '''
helm-docs --chart-search-root=charts --log-level=warn
helm-schema --chart-search-root charts/miroir --skip-auto-generation required,additionalProperties --append-newline
git diff --exit-code charts/miroir/README.md charts/miroir/values.schema.json
'''

[tasks.helm-docs]
description = "Generate the chart README + values.schema.json from Chart.yaml + values.yaml"
run = """
helm-docs --chart-search-root=charts --log-level=warn
# required/additionalProperties are skipped so the schema stays permissive: values.yaml
# supplies every default and the free-form maps stay open. --append-newline gives a
# clean EOF; the file is .prettierignore'd (a generated artifact), so oxfmt skips it.
helm-schema --chart-search-root charts/miroir --skip-auto-generation required,additionalProperties --append-newline
"""

[tasks.helm-crds]
description = "Generate CRDs and copy them into the Helm chart"
depends = ["manifests"]
run = '''
mkdir -p charts/miroir/crds
cp config/crd/bases/*.yaml charts/miroir/crds/
'''

[tasks.test]
description = "Run unit tests"
depends = ["manifests", "generate", "fmt", "vet"]
run = "go test $(go list ./... | grep -v /e2e | grep -v /integration) -coverprofile cover.out"

[tasks.test-integration]
description = "Run integration tests with envtest"
depends = ["manifests", "generate", "fmt", "vet"]
run = '''
envtest_k8s="${ENVTEST_K8S_VERSION:-$(go list -m k8s.io/api | sed -E 's/.*v0\.([0-9]+).*/1.\1/')}"
bin_dir="$PWD/bin"
mkdir -p "$bin_dir"
export KUBEBUILDER_ASSETS="$(setup-envtest use "$envtest_k8s" --bin-dir "$bin_dir" -p path)"
go test ./test/integration/ -v -ginkgo.v
'''

[tasks.e2e-cluster]
description = "Create (or reuse) the ephemeral miroir-test-e2e kind cluster (isolated KUBECONFIG under bin/e2e)"
env = { KUBECONFIG = "{{config_root}}/bin/e2e/kubeconfig" }
run = '''
set -eu
cluster="${KIND_CLUSTER:-miroir-test-e2e}"
mkdir -p "$(dirname "$KUBECONFIG")"
kind get clusters 2>/dev/null | grep -qx "$cluster" || kind create cluster --name "$cluster"
kind export kubeconfig --name "$cluster" --kubeconfig "$KUBECONFIG"
'''

[tasks.e2e-image]
description = "Build the miroir controller+agent e2e images and load them into the kind cluster"
run = '''
set -eu
cluster="${KIND_CLUSTER:-miroir-test-e2e}"
docker build --target controller -t miroir-controller:e2e .
docker build --target agent -t miroir-agent:e2e .
kind load docker-image miroir-controller:e2e --name "$cluster"
kind load docker-image miroir-agent:e2e --name "$cluster"
'''

[tasks.e2e-provision]
description = "Seed a loop-backed lvmthin device, install the CSI snapshot stack, and helm-install miroir"
depends = ["manifests"]
env = { KUBECONFIG = "{{config_root}}/bin/e2e/kubeconfig" }
run = '''
set -eu
cluster="${KIND_CLUSTER:-miroir-test-e2e}"
node="${cluster}-control-plane"
snap_ver="v8.6.0"

# Back the lvmthin VG with a loop device on a sparse file in the node; the
# agent's Setup() builds the PV/VG/thin-pool on it.
echo "==> seeding loop-backed block device on $node"
docker exec -e DISK_SIZE="${MIROIR_E2E_DISK_SIZE:-10G}" "$node" sh -c '
  set -e
  modprobe dm_thin_pool 2>/dev/null || true
  modprobe loop 2>/dev/null || true
  # kind nodes do not create /dev/loop* device nodes; losetup needs them.
  for i in 0 1 2 3 4 5 6 7; do [ -e /dev/loop$i ] || mknod /dev/loop$i b 7 $i; done
  # kind nodes run no udev and ship no /run/lvm; the agent hostPath-mounts both.
  mkdir -p /run/udev /run/lvm
  mkdir -p /var/lib/miroir-e2e
  [ -f /var/lib/miroir-e2e/disk.img ] || truncate -s "$DISK_SIZE" /var/lib/miroir-e2e/disk.img
  losetup -j /var/lib/miroir-e2e/disk.img | grep -q . || losetup -f /var/lib/miroir-e2e/disk.img
'
device="$(docker exec "$node" losetup -j /var/lib/miroir-e2e/disk.img -O NAME -n | tr -d ' ')"
[ -n "$device" ] || { echo "error: no loop device bound for the lvmthin pool" >&2; exit 1; }
echo "==> lvmthin device on $node: $device"

echo "==> installing CSI snapshot stack ($snap_ver)"
kubectl apply -k "https://github.com/kubernetes-csi/external-snapshotter//client/config/crd?ref=$snap_ver"
kubectl wait --for=condition=established --timeout=60s \
  crd/volumesnapshotclasses.snapshot.storage.k8s.io \
  crd/volumesnapshotcontents.snapshot.storage.k8s.io \
  crd/volumesnapshots.snapshot.storage.k8s.io
kubectl apply -k "https://github.com/kubernetes-csi/external-snapshotter//deploy/kubernetes/snapshot-controller?ref=$snap_ver"
kubectl -n kube-system rollout status deploy/snapshot-controller --timeout=150s

echo "==> helm install miroir"
helm upgrade --install miroir charts/miroir \
  --namespace miroir-system --create-namespace \
  --wait --timeout 5m \
  -f deploy/e2e/values.yaml \
  --set "nodes.${node}.backend=lvmthin" \
  --set "nodes.${node}.device=${device}"
'''

[tasks.e2e-run]
description = "Run the Go e2e specs against the provisioned kind cluster"
env = { KUBECONFIG = "{{config_root}}/bin/e2e/kubeconfig" }
run = "go test -tags e2e ./test/e2e/ -v -ginkgo.v -timeout 20m"

[tasks.e2e-conformance]
description = "Run the upstream external-storage conformance suite against the provisioned kind cluster"
env = { KUBECONFIG = "{{config_root}}/bin/e2e/kubeconfig" }
run = "TESTDRIVER=testdriver-local.yaml ./test/conformance/run.sh"

[tasks.e2e-cluster-replicated]
description = "Create (or reuse) a 3-node kind cluster for the replicated (DRBD) e2e suite"
env = { KUBECONFIG = "{{config_root}}/bin/e2e/kubeconfig" }
run = '''
set -eu
cluster="${KIND_CLUSTER:-miroir-test-e2e}"
mkdir -p "$(dirname "$KUBECONFIG")"
kind get clusters 2>/dev/null | grep -qx "$cluster" \
  || kind create cluster --name "$cluster" --config test/e2e/kind-replicated.yaml
kind export kubeconfig --name "$cluster" --kubeconfig "$KUBECONFIG"
'''

[tasks.e2e-provision-replicated]
description = "Seed a loop-backed lvmthin device on every kind node and helm-install miroir for the replicated suite"
depends = ["manifests"]
env = { KUBECONFIG = "{{config_root}}/bin/e2e/kubeconfig" }
run = '''
set -eu
cluster="${KIND_CLUSTER:-miroir-test-e2e}"

# Every node gets its own loop-backed lvmthin pool — DRBD replicates across
# them. Same node plumbing as e2e-provision, applied to all nodes.
set_args=""
for node in $(kind get nodes --name "$cluster"); do
  echo "==> seeding loop-backed block device on $node"
  docker exec -e DISK_SIZE="${MIROIR_E2E_DISK_SIZE:-10G}" "$node" sh -c '
    set -e
    modprobe dm_thin_pool 2>/dev/null || true
    modprobe loop 2>/dev/null || true
    for i in 0 1 2 3 4 5 6 7; do [ -e /dev/loop$i ] || mknod /dev/loop$i b 7 $i; done
    mkdir -p /run/udev /run/lvm /var/lib/miroir-e2e
    [ -f /var/lib/miroir-e2e/disk.img ] || truncate -s "$DISK_SIZE" /var/lib/miroir-e2e/disk.img
    losetup -j /var/lib/miroir-e2e/disk.img | grep -q . || losetup -f /var/lib/miroir-e2e/disk.img
  '
  device="$(docker exec "$node" losetup -j /var/lib/miroir-e2e/disk.img -O NAME -n | tr -d ' ')"
  [ -n "$device" ] || { echo "error: no loop device bound on $node" >&2; exit 1; }
  echo "==> lvmthin device on $node: $device"
  set_args="$set_args --set nodes.${node}.backend=lvmthin --set nodes.${node}.device=${device}"
done

snap_ver="v8.6.0"
echo "==> installing CSI snapshot stack ($snap_ver)"
kubectl apply -k "https://github.com/kubernetes-csi/external-snapshotter//client/config/crd?ref=$snap_ver"
kubectl wait --for=condition=established --timeout=60s \
  crd/volumesnapshotclasses.snapshot.storage.k8s.io \
  crd/volumesnapshotcontents.snapshot.storage.k8s.io \
  crd/volumesnapshots.snapshot.storage.k8s.io
kubectl apply -k "https://github.com/kubernetes-csi/external-snapshotter//deploy/kubernetes/snapshot-controller?ref=$snap_ver"
kubectl -n kube-system rollout status deploy/snapshot-controller --timeout=150s

echo "==> helm install miroir (replicated)"
# shellcheck disable=SC2086
helm upgrade --install miroir charts/miroir \
  --namespace miroir-system --create-namespace \
  --wait --timeout 5m \
  -f deploy/e2e/values.yaml \
  $set_args
'''

[tasks.e2e-run-replicated]
description = "Run the replicated (DRBD) Go e2e spec against the provisioned kind cluster"
env = { KUBECONFIG = "{{config_root}}/bin/e2e/kubeconfig" }
run = 'go test -tags "e2e,replicated" ./test/e2e/ -v -ginkgo.v -ginkgo.focus="miroir-replicated volume health" -timeout 30m'

[tasks.e2e-diagnostics]
description = "Dump kind cluster state for debugging a failed e2e"
env = { KUBECONFIG = "{{config_root}}/bin/e2e/kubeconfig" }
run = '''
set +e
echo "---- miroir CRs ----"
kubectl get miroirvolumes,miroirsnapshots -o wide
echo "---- workloads + storage ----"
kubectl get pods,pvc,pv,volumesnapshot -A -o wide
echo "---- Warning events ----"
kubectl get events -A --field-selector type=Warning --sort-by=.lastTimestamp
echo "---- controller logs ----"
kubectl logs -n miroir-system -l app.kubernetes.io/component=controller --tail=200 --all-containers
echo "---- agent logs ----"
kubectl logs -n miroir-system -l app.kubernetes.io/component=agent --tail=200 --all-containers
true
'''

[tasks.e2e-down]
description = "Delete the ephemeral miroir-test-e2e kind cluster"
env = { KUBECONFIG = "{{config_root}}/bin/e2e/kubeconfig" }
run = '''
set -u
cluster="${KIND_CLUSTER:-miroir-test-e2e}"
kind delete cluster --name "$cluster" >/dev/null 2>&1 || true
rm -f "$KUBECONFIG" || true
'''

[tasks.test-e2e]
description = "Full e2e: kind up, build+load image, provision, run specs, tear down (MIROIR_KEEP_KIND=1 keeps the cluster)"
depends = ["manifests", "generate", "fmt", "vet"]
run = '''
set -eu
for b in docker kind kubectl helm; do command -v "$b" >/dev/null 2>&1 || { echo "error: '$b' required" >&2; exit 127; }; done
cleanup() {
  rc=$?
  [ "$rc" -ne 0 ] && mise run e2e-diagnostics || true
  [ "${MIROIR_KEEP_KIND:-0}" = 1 ] || mise run e2e-down || true
  exit $rc
}
trap cleanup EXIT
mise run e2e-cluster
mise run e2e-image
mise run e2e-provision
mise run e2e-run
'''

[tasks.build]
description = "Build miroir binary"
depends = ["generate", "fmt", "vet"]
run = '''
version="${VERSION:-$(git describe --tags --always 2>/dev/null || echo dev)}"
commit="$(git rev-parse --short HEAD 2>/dev/null || echo unknown)"
go build -ldflags "-X main.version=$version -X main.commit=$commit" -o bin/miroir cmd/main.go
'''

[tasks.run-controller]
description = "Run the controller from your host"
depends = ["manifests", "generate", "fmt", "vet"]
run = "go run ./cmd/main.go --mode=controller"

[hooks]
postinstall = "lefthook install"
