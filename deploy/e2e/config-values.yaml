# miroir-config values for the single-node kind e2e. The node entry is
# injected with --set by the e2e-provision task (the node name and loop
# device path are only known after the cluster is up). Local backend only —
# kind has no DRBD, so no replicated class. Default class so a PVC with no
# storageClassName still resolves to miroir.
storageClasses:
  - name: miroir-local
    replicas: 1
    isDefault: true
    fsType: ext4
    reclaimPolicy: Delete

volumeSnapshotClasses:
  - name: miroir-snap
    deletionPolicy: Delete
