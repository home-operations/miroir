suite: test miroirnode
templates:
  - miroirnode.tpl
release:
  name: miroir
  namespace: miroir-system
tests:
  - it: fails fast when no nodes are configured
    set:
      nodes: {}
    asserts:
      - failedTemplate:
          errorMessage: "Helm values must define `nodes` — the per-node storage topology (see values.yaml)"

  - it: fails with a migration pointer on pre-0.11 values (no spec wrapper)
    set:
      nodes:
        node-a:
          pools:
            default:
              backend: lvmthin
              device: /dev/disk/by-partlabel/r-miroir
    asserts:
      - failedTemplate:
          errorMessagePattern: "nodes.node-a: the node must be declared under `spec:`"

  - it: renders one cluster-scoped MiroirNode per entry, spec verbatim
    set:
      nodes:
        node-a:
          spec:
            zone: rack-1
            address: 10.0.100.11
            pools:
              - name: default
                backend: lvmthin
                lvmthin:
                  device: /dev/disk/by-partlabel/r-miroir
                  poolSize: 400g
        node-b:
          spec:
            pools:
              - name: default
                backend: zfs
                zfs:
                  dataset: data-pool/miroir
                  volBlockSize: 16K
                  compression: inherit
    asserts:
      - hasDocuments:
          count: 2
      - documentIndex: 0
        equal:
          path: kind
          value: MiroirNode
      - documentIndex: 0
        equal:
          path: apiVersion
          value: miroir.home-operations.com/v1alpha1
      - documentIndex: 0
        equal:
          path: metadata.name
          value: node-a
      # Cluster-scoped: no namespace on the object.
      - documentIndex: 0
        notExists:
          path: metadata.namespace
      - documentIndex: 0
        equal:
          path: spec.zone
          value: rack-1
      - documentIndex: 0
        equal:
          path: spec.address
          value: 10.0.100.11
      - documentIndex: 0
        equal:
          path: spec.pools[0].name
          value: default
      - documentIndex: 0
        equal:
          path: spec.pools[0].backend
          value: lvmthin
      - documentIndex: 0
        equal:
          path: spec.pools[0].lvmthin.device
          value: /dev/disk/by-partlabel/r-miroir
      - documentIndex: 0
        equal:
          path: spec.pools[0].lvmthin.poolSize
          value: 400g
      - documentIndex: 1
        equal:
          path: metadata.name
          value: node-b
      - documentIndex: 1
        equal:
          path: spec.pools[0].zfs.dataset
          value: data-pool/miroir
      - documentIndex: 1
        equal:
          path: spec.pools[0].zfs.volBlockSize
          value: 16K
      - documentIndex: 1
        equal:
          path: spec.pools[0].zfs.compression
          value: inherit

  - it: passes unknown spec fields through untouched (the CRD is the validator)
    set:
      nodes:
        node-a:
          spec:
            autoEvict: false
            pools:
              - name: default
                backend: loopfile
                loopfile:
                  baseDir: /var/lib/miroir
    asserts:
      - documentIndex: 0
        equal:
          path: spec.autoEvict
          value: false
      - documentIndex: 0
        equal:
          path: spec.pools[0].loopfile.baseDir
          value: /var/lib/miroir

  - it: labels the objects for release ownership
    set:
      nodes:
        node-a:
          spec:
            pools:
              - name: default
                backend: lvmthin
                lvmthin: {}
    asserts:
      - documentIndex: 0
        equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
      - documentIndex: 0
        equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: miroir
