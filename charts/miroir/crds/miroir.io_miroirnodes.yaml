---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: miroirnodes.miroir.io
spec:
  group: miroir.io
  names:
    kind: MiroirNode
    listKind: MiroirNodeList
    plural: miroirnodes
    shortNames:
      - min
    singular: miroirnode
  scope: Cluster
  versions:
    - additionalPrinterColumns:
        - jsonPath: .spec.backend
          name: Backend
          type: string
        - jsonPath: .status.capacityBytes
          name: Capacity
          type: integer
        - jsonPath: .status.allocatedBytes
          name: Allocated
          type: integer
        - jsonPath: .metadata.creationTimestamp
          name: Age
          type: date
      name: v1alpha1
      schema:
        openAPIV3Schema:
          description: |-
            MiroirNode publishes one storage node's pool capacity. Named after the
            node; written by that node's agent, read by the controller at placement.
          properties:
            apiVersion:
              description: |-
                APIVersion defines the versioned schema of this representation of an object.
                Servers should convert recognized schemas to the latest internal value, and
                may reject unrecognized values.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
              type: string
            kind:
              description: |-
                Kind is a string value representing the REST resource this object represents.
                Servers may infer this from the endpoint the client submits requests to.
                Cannot be updated.
                In CamelCase.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
              type: string
            metadata:
              type: object
            spec:
              description: |-
                MiroirNodeSpec records which backend a storage node runs, mirrored from
                the node map so `kubectl get miroirnodes` reads without the ConfigMap.
              properties:
                backend:
                  description: Backend is the storage implementation backing this node's
                    pool.
                  enum:
                    - lvmthin
                    - zfs
                    - loopfile
                  type: string
              type: object
            status:
              description: |-
                MiroirNodeStatus is the pool capacity this node's agent publishes for
                capacity-aware placement and overcommit guardrails (DESIGN.md §4.6).
                On a shared pool (e.g. ZFS shared with OpenEBS) the figures are
                pool-level, so a co-tenant's growth correctly shrinks miroir's headroom.
              properties:
                allocatedBytes:
                  description: AllocatedBytes is the pool capacity currently used (all
                    tenants).
                  format: int64
                  type: integer
                capacityBytes:
                  description: CapacityBytes is the total size of the node-local pool.
                  format: int64
                  type: integer
                conditions:
                  description: |-
                    Conditions follow the standard Kubernetes condition conventions;
                    PoolUsageHigh fires at the 80% data/metadata warn line.
                  items:
                    description: Condition contains details for one aspect of the current
                      state of this API Resource.
                    properties:
                      lastTransitionTime:
                        description: |-
                          lastTransitionTime is the last time the condition transitioned from one status to another.
                          This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                        format: date-time
                        type: string
                      message:
                        description: |-
                          message is a human readable message indicating details about the transition.
                          This may be an empty string.
                        maxLength: 32768
                        type: string
                      observedGeneration:
                        description: |-
                          observedGeneration represents the .metadata.generation that the condition was set based upon.
                          For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                          with respect to the current state of the instance.
                        format: int64
                        minimum: 0
                        type: integer
                      reason:
                        description: |-
                          reason contains a programmatic identifier indicating the reason for the condition's last transition.
                          Producers of specific condition types may define expected values and meanings for this field,
                          and whether the values are considered a guaranteed API.
                          The value should be a CamelCase string.
                          This field may not be empty.
                        maxLength: 1024
                        minLength: 1
                        pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                        type: string
                      status:
                        description: status of the condition, one of True, False, Unknown.
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                        type: string
                      type:
                        description: type of condition in CamelCase or in foo.example.com/CamelCase.
                        maxLength: 316
                        pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                        type: string
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    type: object
                  type: array
                metaUsedPercent:
                  description: |-
                    MetaUsedPercent is the dm-thin metadata usage (lvmthin only; 0
                    otherwise), rounded — exhausting metadata wedges the pool
                    independently of data space.
                  format: int32
                  type: integer
                observedAt:
                  description: |-
                    ObservedAt is when these figures were last sampled; the controller
                    ignores stats older than a few poll intervals as unknown.
                  format: date-time
                  type: string
              type: object
          type: object
      served: true
      storage: true
      subresources:
        status: {}
