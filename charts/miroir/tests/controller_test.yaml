suite: test controller
templates:
  - controller.tpl
release:
  name: miroir
  namespace: miroir-system
tests:
  - it: renders a single-replica Deployment with all four containers
    documentIndex: 0
    asserts:
      - equal:
          path: kind
          value: Deployment
      - equal:
          path: apiVersion
          value: apps/v1
      - equal:
          path: metadata.name
          value: miroir-controller
      - equal:
          path: spec.replicas
          value: 1
      - equal:
          path: spec.strategy.type
          value: Recreate
      - equal:
          path: spec.template.spec.serviceAccountName
          value: miroir-controller
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 65532
      - equal:
          path: spec.template.spec.securityContext.seccompProfile.type
          value: RuntimeDefault
      - lengthEqual:
          path: spec.template.spec.containers
          count: 4
      - contains:
          any: true
          path: spec.template.spec.containers
          content:
            name: controller
      - contains:
          any: true
          path: spec.template.spec.containers
          content:
            name: csi-provisioner
      - contains:
          any: true
          path: spec.template.spec.containers
          content:
            name: csi-snapshotter
      - contains:
          any: true
          path: spec.template.spec.containers
          content:
            name: csi-resizer

  - it: controller container runs with image, mode=controller and a non-root securityContext
    documentIndex: 0
    asserts:
      - equal:
          path: spec.template.spec.containers[0].name
          value: controller
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ghcr.io/home-operations/miroir-controller:0.0.1"
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: IfNotPresent
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--mode=controller"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--csi-socket=/csi/csi.sock"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--nodes-config=/etc/miroir/nodes.yaml"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--auto-tie-breaker=true"
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop[0]
          value: ALL
      - lengthEqual:
          path: spec.template.spec.containers[0].ports
          count: 1
      - equal:
          path: spec.template.spec.containers[0].ports[0].name
          value: metrics
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8081
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: metrics
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: metrics

  - it: flows provisionTimeout into the controller args
    set:
      provisionTimeout: 90s
    documentIndex: 0
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--provision-timeout=90s"

  - it: autoTieBreaker=false opts out of tie-breaker placement
    set:
      autoTieBreaker: false
    documentIndex: 0
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--auto-tie-breaker=false"

  - it: each sidecar picks up its own image and timeout
    set:
      sidecars.provisioner.timeout: 75s
      sidecars.provisioner.image: registry.k8s.io/sig-storage/csi-provisioner:v9.9.9
      sidecars.snapshotter.timeout: 76s
      sidecars.snapshotter.image: registry.k8s.io/sig-storage/csi-snapshotter:v9.9.9
      sidecars.resizer.timeout: 77s
      sidecars.resizer.image: registry.k8s.io/sig-storage/csi-resizer:v9.9.9
    documentIndex: 0
    asserts:
      - contains:
          any: true
          path: spec.template.spec.containers
          content:
            name: csi-provisioner
            image: registry.k8s.io/sig-storage/csi-provisioner:v9.9.9
            args:
              - "--csi-address=/csi/csi.sock"
              - "--timeout=75s"
              - "--leader-election=false"
              - "--default-fstype=ext4"
      - contains:
          any: true
          path: spec.template.spec.containers
          content:
            name: csi-snapshotter
            image: registry.k8s.io/sig-storage/csi-snapshotter:v9.9.9
            args:
              - "--csi-address=/csi/csi.sock"
              - "--timeout=76s"
              - "--leader-election=false"
      - contains:
          any: true
          path: spec.template.spec.containers
          content:
            name: csi-resizer
            image: registry.k8s.io/sig-storage/csi-resizer:v9.9.9
            args:
              - "--csi-address=/csi/csi.sock"
              - "--timeout=77s"
              - "--leader-election=false"

  - it: the controller pod is cluster-critical by default
    documentIndex: 0
    asserts:
      - equal:
          path: spec.template.spec.priorityClassName
          value: system-cluster-critical

  - it: respects a custom image repository + tag
    set:
      image:
        repository: registry.example.com/miroir
        tag: 1.2.3
        pullPolicy: Always
    documentIndex: 0
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "registry.example.com/miroir:1.2.3"
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always

  - it: pins the image by digest when set, overriding the tag
    set:
      image:
        tag: 1.2.3
        digest: sha256:abc123
    documentIndex: 0
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ghcr.io/home-operations/miroir-controller@sha256:abc123"

  - it: respects a non-default Release namespace
    release:
      name: miroir
      namespace: storage
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.namespace
          value: storage

  - it: shares a CSI socketDir + the mirror-nodes ConfigMap across the pod
    documentIndex: 0
    asserts:
      - contains:
          any: true
          path: spec.template.spec.volumes
          content:
            name: socket-dir
            emptyDir: {}
      - contains:
          any: true
          path: spec.template.spec.volumes
          content:
            name: nodes
            configMap:
              name: miroir-nodes

  - it: applies global pull secrets, scheduling, and common labels
    set:
      global:
        imagePullSecrets:
          - name: ghcr-pull
        nodeSelector:
          kubernetes.io/arch: amd64
        tolerations:
          - key: dedicated
            operator: Equal
            value: storage
            effect: NoSchedule
        commonLabels:
          team: platform
    documentIndex: 0
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: ghcr-pull
      - equal:
          path: spec.template.spec.nodeSelector["kubernetes.io/arch"]
          value: amd64
      - equal:
          path: spec.template.spec.tolerations[0].key
          value: dedicated
      - equal:
          path: metadata.labels.team
          value: platform

  - it: renders no scheduling or pull-secret fields by default
    documentIndex: 0
    asserts:
      - notExists:
          path: spec.template.spec.imagePullSecrets
      - notExists:
          path: spec.template.spec.nodeSelector
      - notExists:
          path: spec.template.spec.tolerations

  - it: honours fullnameOverride and nameOverride
    set:
      fullnameOverride: replicator
      nameOverride: mir
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.name
          value: replicator-controller
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: mir

  - it: wires logging, pod metadata, and extra args/env
    set:
      logging:
        level: debug
        format: console
      podLabels:
        sidecar.istio.io/inject: "false"
      podAnnotations:
        reloader.stakater.com/auto: "true"
      extraArgs:
        - --leak-check=true
      extraEnv:
        - name: GOMEMLIMIT
          value: 100MiB
    documentIndex: 0
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --zap-log-level=debug
      - contains:
          path: spec.template.spec.containers[0].args
          content: --zap-encoder=console
      - contains:
          path: spec.template.spec.containers[0].args
          content: --leak-check=true
      - equal:
          path: spec.template.spec.containers[0].env[0].name
          value: GOMEMLIMIT
      - equal:
          path: spec.template.metadata.labels["sidecar.istio.io/inject"]
          value: "false"
      - equal:
          path: spec.template.metadata.annotations["reloader.stakater.com/auto"]
          value: "true"
