# Driver definition for the upstream Kubernetes external-storage e2e
# suite (test/e2e/storage/external). Run via ./run.sh.
#
# Uses the production StorageClass/VolumeSnapshotClass so the gate tests
# the replicated (DRBD) path with the shipped configuration.
StorageClass:
  FromExistingClassName: miroir-replicated
SnapshotClass:
  FromExistingClassName: miroir-snap
GroupSnapshotClass:
  FromExistingClassName: miroir-group-snap
DriverInfo:
  Name: miroir.home-operations.com
  SupportedSizeRange:
    Min: 1Gi
    Max: 10Gi
  SupportedFsType:
    ext4: {}
    xfs: {}
  SupportedMountOption:
    noatime: {}
  Capabilities:
    persistence: true
    block: true
    exec: true
    fsGroup: true
    multipods: true
    controllerExpansion: true
    nodeExpansion: true
    onlineExpansion: true
    offlineExpansion: true
    snapshotDataSource: true
    groupSnapshot: true
    pvcDataSource: true
    topology: true
    singleNodeVolume: false
    # The filesystem-only testdriver-rwx.yaml covers multi-node access without
    # also enabling unsupported raw-block RWX patterns in this block-capable run.
    RWX: false
    multiplePVsSameID: true
    readWriteOncePod: true
    capacity: true
