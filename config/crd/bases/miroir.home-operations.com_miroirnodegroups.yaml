---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: miroirnodegroups.miroir.home-operations.com
spec:
  group: miroir.home-operations.com
  names:
    kind: MiroirNodeGroup
    listKind: MiroirNodeGroupList
    plural: miroirnodegroups
    shortNames:
    - ming
    singular: miroirnodegroup
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.nodes
      name: Members
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          MiroirNodeGroup materializes one MiroirNode per label-matched node, so a
          fleet sharing a storage layout (a device-path convention, a common ZFS
          dataset) is one object and joining it is labeling the node. Direct
          MiroirNodes always win over groups, and membership changes never delete
          a MiroirNode — members that stop matching are orphaned in place.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              MiroirNodeGroupSpec selects a set of nodes and the MiroirNode spec they
              share.
            properties:
              nodeSelector:
                description: |-
                  NodeSelector picks the member nodes by label. An empty selector
                  matches every node in the cluster (the Kubernetes convention).
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              template:
                description: |-
                  Template is the MiroirNode spec applied to every member, with two
                  per-node facts resolved from the Node object: an empty zone
                  inherits the node's topology.kubernetes.io/zone label, and the
                  replication address comes from the node's
                  miroir.home-operations.com/address annotation.
                properties:
                  address:
                    description: |-
                      Address optionally pins the node's DRBD replication endpoint to a
                      dedicated storage NIC/VLAN IP (IPv4 or IPv6); empty falls back to
                      the node's InternalIP. It applies to volumes created afterwards —
                      existing volumes keep the address persisted at creation. An explicit
                      empty string means unset (0.10 values files carry them).
                    maxLength: 45
                    type: string
                    x-kubernetes-validations:
                    - message: address must be a plain IPv4 or IPv6 address
                      rule: self == '' || isIP(self)
                  autoEvict:
                    description: |-
                      AutoEvict, when explicitly false, exempts this node from auto-evict:
                      its legs are never re-placed while its heartbeat is stale (a node
                      with known long outages). Absent means eligible.
                    type: boolean
                  pools:
                    description: |-
                      Pools lists this node's storage pools, one entry per pool. Every
                      node in the topology carries at least one.
                    items:
                      description: |-
                        MiroirNodePool is one named storage pool on a node. The backend is the
                        configuration block that is present — exactly one of lvmthin/zfs/
                        loopfile, even when it has nothing to say (lvmthin: {} when the VG
                        already exists). Pool names are cluster-wide identities — a
                        StorageClass selects a pool by name and the controller places each
                        replica on a node carrying that pool.
                      properties:
                        loopfile:
                          description: Loopfile makes this a loopfile pool.
                          properties:
                            baseDir:
                              description: |-
                                BaseDir is the directory holding the sparse files, e.g.
                                "/var/lib/miroir". Must be reflink-capable (XFS reflink=1 or btrfs)
                                for CoW snapshots; the agent refuses the pool otherwise.
                              maxLength: 256
                              minLength: 1
                              type: string
                          required:
                          - baseDir
                          type: object
                        lvmthin:
                          description: LVMThin makes this an lvmthin pool.
                          properties:
                            device:
                              description: |-
                                Device is the block device backing the pool's VG. Optional when the
                                VG already exists (a pre-provisioned or shared VG); required for the
                                agent to create it on first start.
                              maxLength: 256
                              type: string
                            poolSize:
                              description: |-
                                PoolSize bounds the thin pool (an lvm size spec, e.g. "400g");
                                empty claims all free VG space.
                              maxLength: 32
                              type: string
                          type: object
                        name:
                          description: |-
                            Name is the pool name ("default" for the pre-multi-pool single
                            pool). It becomes an LVM VG name suffix, a metric label value, and a
                            StorageClass parameter, so it stays a short lowercase identifier.
                          pattern: ^[a-z0-9]([a-z0-9-]{0,30}[a-z0-9])?$
                          type: string
                        zfs:
                          description: ZFS makes this a zfs pool.
                          properties:
                            compression:
                              default: lz4
                              description: |-
                                Compression is the compression property for newly created zvols;
                                "inherit" uses the parent dataset's setting. Existing zvols are not
                                mutated, and snapshot clones retain their source properties. Empty
                                means the default (lz4) — 0.10 values files carry explicit empty
                                strings, and the agent has always defaulted them.
                              pattern: ^(|inherit|on|off|lz4|lzjb|zle|gzip(-[1-9])?|zstd(-([1-9]|1[0-9]))?|zstd-fast(-(10|[1-9]|[2-9]0|100|500|1000))?)$
                              type: string
                            dataset:
                              description: Dataset is the parent dataset for zvols.
                              maxLength: 256
                              minLength: 1
                              type: string
                            volBlockSize:
                              default: 4K
                              description: |-
                                VolBlockSize is the volblocksize property for newly created zvols.
                                Empty means the default (4K), for the same 0.10 compatibility reason
                                as Compression.
                              enum:
                              - ""
                              - 4K
                              - 8K
                              - 16K
                              - 32K
                              - 64K
                              - 128K
                              type: string
                          required:
                          - dataset
                          type: object
                      required:
                      - name
                      type: object
                      x-kubernetes-validations:
                      - message: 'exactly one backend block (lvmthin, zfs, or loopfile)
                          must be set — lvmthin: {} when the VG already exists'
                        rule: '[has(self.lvmthin), has(self.zfs), has(self.loopfile)].filter(x,
                          x).size() == 1'
                    maxItems: 32
                    minItems: 1
                    type: array
                    x-kubernetes-list-map-keys:
                    - name
                    x-kubernetes-list-type: map
                    x-kubernetes-validations:
                    - message: no two pools may share a device
                      rule: self.filter(p, has(p.lvmthin) && has(p.lvmthin.device)).map(p,
                        p.lvmthin.device).all(d, self.filter(p, has(p.lvmthin) &&
                        has(p.lvmthin.device) && p.lvmthin.device == d).size() ==
                        1)
                    - message: no two pools may share a dataset
                      rule: self.filter(p, has(p.zfs)).map(p, p.zfs.dataset).all(d,
                        self.filter(p, has(p.zfs) && p.zfs.dataset == d).size() ==
                        1)
                    - message: no two pools may share a baseDir
                      rule: self.filter(p, has(p.loopfile)).map(p, p.loopfile.baseDir).all(d,
                        self.filter(p, has(p.loopfile) && p.loopfile.baseDir == d).size()
                        == 1)
                  zone:
                    description: |-
                      Zone is an optional failure domain (rack, host group, AZ). When set,
                      the controller spreads a volume's replicas across distinct zones;
                      empty means unconstrained.
                    maxLength: 63
                    type: string
                required:
                - pools
                type: object
            required:
            - nodeSelector
            - template
            type: object
            x-kubernetes-validations:
            - message: 'address is a per-node fact: annotate the Node with miroir.home-operations.com/address,
                or author a direct MiroirNode'
              rule: '!has(self.template.address) || size(self.template.address) ==
                0'
          status:
            description: MiroirNodeGroupStatus reports the group's materialized membership.
            properties:
              conditions:
                description: Conditions follow the standard Kubernetes condition conventions.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              nodes:
                description: |-
                  Nodes lists the member nodes whose MiroirNode this group currently
                  manages, sorted by name.
                items:
                  type: string
                type: array
              observedGeneration:
                description: ObservedGeneration is the spec generation this status
                  reflects.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
