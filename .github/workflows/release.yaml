# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# Personal-account release flow: release-please and the build/publish jobs
# live in ONE workflow, chained by job outputs instead of release events —
# GITHUB_TOKEN-created releases never trigger sibling workflows, and a
# personal repo has no org bot app to work around that.
name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  versions:
    name: Versions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      go-version: ${{ steps.versions.outputs.go-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          cache: false
          experimental: true
          install: false

      - name: Resolve versions
        id: versions
        run: echo "go-version=$(mise config get tools.go)" >> "$GITHUB_OUTPUT"

  image:
    name: Image
    needs:
      - release-please
      - versions
    permissions:
      contents: read
      id-token: write
      packages: write
    uses: docker/github-builder/.github/workflows/build.yml@17bd7d64200cae4ba58ffc099934e8012ae320f2 # v1.10.0
    with:
      build-args: |
        VERSION=${{ needs.release-please.outputs.release_created == 'true' && needs.release-please.outputs.tag_name || github.ref_name }}
        REVISION=${{ github.sha }}
        GO_VERSION=${{ needs.versions.outputs.go-version }}
      cache: true
      meta-images: ghcr.io/${{ github.repository }}
      meta-tags: |
        type=raw,value=${{ needs.release-please.outputs.tag_name }},enable=${{ needs.release-please.outputs.release_created == 'true' }}
        type=raw,value=rolling,enable=${{ needs.release-please.outputs.release_created == 'true' }}
        type=ref,event=branch
      output: image
      platforms: linux/amd64,linux/arm64
      push: true
      sbom: true
      sign: true
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

  helm:
    name: Helm
    needs:
      - release-please
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      # Releases publish the real version; every other main push publishes
      # a mutable 0.0.0-main chart so the cluster can test pre-release.
      VERSION: ${{ needs.release-please.outputs.release_created == 'true' && needs.release-please.outputs.tag_name || '0.0.0-main' }}
      APP_VERSION: ${{ needs.release-please.outputs.release_created == 'true' && needs.release-please.outputs.tag_name || 'main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          cache: false
          experimental: true

      - name: Generate manifests and CRDs
        run: mise run helm-crds

      - name: Package Helm chart
        run: |
          helm package charts/miroir \
            --version "${VERSION}" \
            --app-version "${APP_VERSION}"

      - name: Log in to Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Helm chart to GHCR
        run: |-
          helm push "miroir-${VERSION}.tgz" "oci://ghcr.io/${{ github.repository_owner }}/charts"
