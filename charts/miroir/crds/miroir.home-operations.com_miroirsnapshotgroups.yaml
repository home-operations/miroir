---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: miroirsnapshotgroups.miroir.home-operations.com
spec:
  group: miroir.home-operations.com
  names:
    kind: MiroirSnapshotGroup
    listKind: MiroirSnapshotGroupList
    plural: miroirsnapshotgroups
    shortNames:
    - misg
    singular: miroirsnapshotgroup
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.readyToUse
      name: Ready
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          MiroirSnapshotGroup is one crash-consistent point-in-time snapshot cut
          across several MiroirVolumes at once (1:1 with a
          VolumeGroupSnapshotContent). Its members are ordinary MiroirSnapshots
          that restore individually; the group coordinates their cut under one
          shared write barrier.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              MiroirSnapshotGroupSpec is the desired state, created by the controller
              on CSI CreateVolumeGroupSnapshot.
            properties:
              snapshotNames:
                description: |-
                  SnapshotNames lists the member MiroirSnapshots (one per source
                  volume, each carrying this group's name in spec.group). Immutable:
                  the group barrier is cut atomically over exactly this member set,
                  so growing or shrinking it after the fact would misrepresent what
                  the cut covered.
                items:
                  type: string
                minItems: 1
                type: array
                x-kubernetes-validations:
                - message: 'snapshotNames is immutable: the group barrier was cut
                    over exactly this member set'
                  rule: self == oldSelf
            required:
            - snapshotNames
            type: object
          status:
            description: |-
              MiroirSnapshotGroupStatus is the shared state of the group's write
              barrier round. One MiroirSnapshotGroup is one round spanning every
              diskful leg of every member volume — the multi-volume generalization
              of the MiroirSnapshot per-node round, kept on a single object so that
              sealing and voiding the round serialize on one resourceVersion.
            properties:
              conditions:
                description: Conditions follow the standard Kubernetes condition conventions.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              ioSuspended:
                description: |-
                  IOSuspended is the group-wide write barrier: set by the round
                  driver after suspending its local member legs, cleared on resume.
                  Legs are cut only while it holds and every slot reports Suspended.
                type: boolean
              perLeg:
                additionalProperties:
                  description: SnapshotNodeState tracks one node's progress through
                    the snapshot barrier.
                  type: string
                description: |-
                  PerLeg maps "<volume>/<node>" to that leg's progress through the
                  group barrier round.
                type: object
              readyToUse:
                description: |-
                  ReadyToUse is true once every diskful leg of every member volume
                  holds its snapshot, all cut inside one shared write barrier.
                type: boolean
              suspendedAt:
                description: |-
                  SuspendedAt bounds the barrier: the driver voids the round at the
                  deadline even if a leg never cuts, so a stuck member cannot freeze
                  every volume in the group forever.
                format: date-time
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
