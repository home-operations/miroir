suite: test configmap
templates:
  - configmap.tpl
release:
  name: miroir
  namespace: miroir-system
tests:
  - it: fails fast when no nodes are configured
    set:
      nodes: {}
    asserts:
      - failedTemplate:
          errorMessage: "Helm values must define `nodes` — the per-node storage topology (see values.yaml)"

  - it: renders the nodes ConfigMap and the drbd ConfigMap
    set:
      nodes:
        kharkiv:
          backend: lvmthin
          device: /dev/disk/by-partlabel/r-miroir
        paris:
          backend: zfs
          zfsDataset: data-pool/miroir
    asserts:
      - hasDocuments:
          count: 2
      - documentIndex: 0
        equal:
          path: kind
          value: ConfigMap
      - documentIndex: 0
        equal:
          path: apiVersion
          value: v1
      - documentIndex: 0
        equal:
          path: metadata.name
          value: miroir-nodes
      - documentIndex: 1
        equal:
          path: kind
          value: ConfigMap
      - documentIndex: 1
        equal:
          path: apiVersion
          value: v1
      - documentIndex: 1
        equal:
          path: metadata.name
          value: miroir-drbd-conf

  - it: embeds the per-node topology in miroir-nodes as YAML
    set:
      nodes:
        kharkiv:
          backend: lvmthin
          device: /dev/disk/by-partlabel/r-miroir
        paris:
          backend: zfs
          zfsDataset: data-pool/miroir
    documentIndex: 0
    asserts:
      - matchRegex:
          path: data["nodes.yaml"]
          pattern: "backend: lvmthin"
      - matchRegex:
          path: data["nodes.yaml"]
          pattern: "device: /dev/disk/by-partlabel/r-miroir"
      - matchRegex:
          path: data["nodes.yaml"]
          pattern: "backend: zfs"
      - matchRegex:
          path: data["nodes.yaml"]
          pattern: "zfsDataset: data-pool/miroir"

  - it: keeps the drbd global config to usage-count no and an empty common{}
    set:
      nodes:
        kharkiv:
          backend: lvmthin
          device: /dev/disk/by-partlabel/r-miroir
    documentIndex: 1
    asserts:
      - matchRegex:
          path: data["global_common.conf"]
          pattern: "usage-count no;"
      - matchRegex:
          path: data["global_common.conf"]
          pattern: "common \\{"
      - matchRegex:
          path: data["global_common.conf"]
          pattern: "handlers \\{\\}"

  - it: honours a non-default Release namespace for both ConfigMaps
    release:
      name: miroir
      namespace: storage
    set:
      nodes:
        kharkiv:
          backend: lvmthin
          device: /dev/disk/by-partlabel/r-miroir
    asserts:
      - documentIndex: 0
        equal:
          path: metadata.namespace
          value: storage
      - documentIndex: 1
        equal:
          path: metadata.namespace
          value: storage
