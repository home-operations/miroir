---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: miroirnodes.miroir.home-operations.com
spec:
  group: miroir.home-operations.com
  names:
    kind: MiroirNode
    listKind: MiroirNodeList
    plural: miroirnodes
    shortNames:
    - min
    singular: miroirnode
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.pools[*].name
      name: Pools
      type: string
    - jsonPath: .spec.zone
      name: Zone
      type: string
    - jsonPath: .status.pools[*].capacityBytes
      name: Capacity
      type: string
    - jsonPath: .status.pools[*].allocatedBytes
      name: Allocated
      type: string
    - jsonPath: .status.drbdVersion
      name: DRBD
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          MiroirNode declares one storage node's topology and publishes its pool
          capacities. Named after the node; the spec is authored through the Helm
          chart's `nodes` values, the status is written by that node's agent, and
          the controller reads both at placement.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              MiroirNodeSpec is one storage node's desired topology: its named pools
              plus node-level replication settings. Rendered by the Helm chart from
              the release's `nodes` values; read by the controller for placement and
              by the node's agent for backend selection.
            properties:
              address:
                description: |-
                  Address optionally pins the node's DRBD replication endpoint to a
                  dedicated storage NIC/VLAN IP (IPv4 or IPv6); empty falls back to
                  the node's InternalIP. It applies to volumes created afterwards —
                  existing volumes keep the address persisted at creation. An explicit
                  empty string means unset (0.10 values files carry them).
                maxLength: 45
                type: string
                x-kubernetes-validations:
                - message: address must be a plain IPv4 or IPv6 address
                  rule: self == '' || isIP(self)
              autoEvict:
                description: |-
                  AutoEvict, when explicitly false, exempts this node from auto-evict:
                  its legs are never re-placed while its heartbeat is stale (a node
                  with known long outages). Absent means eligible.
                type: boolean
              pools:
                description: |-
                  Pools lists this node's storage pools, one entry per pool. Every
                  node in the topology carries at least one.
                items:
                  description: |-
                    MiroirNodePool is one named storage pool on a node: the backend
                    implementation plus that backend's configuration block. Pool names are
                    cluster-wide identities — a StorageClass selects a pool by name and the
                    controller places each replica on a node carrying that pool.
                  properties:
                    backend:
                      description: |-
                        Backend is the storage implementation backing this pool. An explicit
                        discriminator (not inferred from the block below): it is also
                        persisted per Replica, beyond pool config.
                      enum:
                      - lvmthin
                      - zfs
                      - loopfile
                      type: string
                    loopfile:
                      description: Loopfile configures the pool when backend is loopfile.
                      properties:
                        baseDir:
                          description: |-
                            BaseDir is the directory holding the sparse files, e.g.
                            "/var/lib/miroir". Must be reflink-capable (XFS reflink=1 or btrfs)
                            for CoW snapshots; the agent refuses the pool otherwise.
                          maxLength: 256
                          minLength: 1
                          type: string
                      required:
                      - baseDir
                      type: object
                    lvmthin:
                      description: LVMThin configures the pool when backend is lvmthin.
                      properties:
                        device:
                          description: |-
                            Device is the block device backing the pool's VG. Optional when the
                            VG already exists (a pre-provisioned or shared VG); required for the
                            agent to create it on first start.
                          maxLength: 256
                          type: string
                        poolSize:
                          description: |-
                            PoolSize bounds the thin pool (an lvm size spec, e.g. "400g");
                            empty claims all free VG space.
                          maxLength: 32
                          type: string
                      type: object
                    name:
                      description: |-
                        Name is the pool name ("default" for the pre-multi-pool single
                        pool). It becomes an LVM VG name suffix, a metric label value, and a
                        StorageClass parameter, so it stays a short lowercase identifier.
                      pattern: ^[a-z0-9]([a-z0-9-]{0,30}[a-z0-9])?$
                      type: string
                    zfs:
                      description: ZFS configures the pool when backend is zfs.
                      properties:
                        compression:
                          default: lz4
                          description: |-
                            Compression is the compression property for newly created zvols;
                            "inherit" uses the parent dataset's setting. Existing zvols are not
                            mutated, and snapshot clones retain their source properties. Empty
                            means the default (lz4) — 0.10 values files carry explicit empty
                            strings, and the agent has always defaulted them.
                          pattern: ^(|inherit|on|off|lz4|lzjb|zle|gzip(-[1-9])?|zstd(-([1-9]|1[0-9]))?|zstd-fast(-(10|[1-9]|[2-9]0|100|500|1000))?)$
                          type: string
                        dataset:
                          description: Dataset is the parent dataset for zvols.
                          maxLength: 256
                          minLength: 1
                          type: string
                        volBlockSize:
                          default: 4K
                          description: |-
                            VolBlockSize is the volblocksize property for newly created zvols.
                            Empty means the default (4K), for the same 0.10 compatibility reason
                            as Compression.
                          enum:
                          - ""
                          - 4K
                          - 8K
                          - 16K
                          - 32K
                          - 64K
                          - 128K
                          type: string
                      required:
                      - dataset
                      type: object
                  required:
                  - backend
                  - name
                  type: object
                  x-kubernetes-validations:
                  - message: 'exactly the selected backend''s configuration block
                      must be set (lvmthin: {} when the VG already exists)'
                    rule: (self.backend == 'lvmthin') == has(self.lvmthin) && (self.backend
                      == 'zfs') == has(self.zfs) && (self.backend == 'loopfile') ==
                      has(self.loopfile)
                maxItems: 32
                minItems: 1
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
                x-kubernetes-validations:
                - message: no two pools may share a device
                  rule: self.filter(p, has(p.lvmthin) && has(p.lvmthin.device)).map(p,
                    p.lvmthin.device).all(d, self.filter(p, has(p.lvmthin) && has(p.lvmthin.device)
                    && p.lvmthin.device == d).size() == 1)
                - message: no two pools may share a dataset
                  rule: self.filter(p, has(p.zfs)).map(p, p.zfs.dataset).all(d, self.filter(p,
                    has(p.zfs) && p.zfs.dataset == d).size() == 1)
                - message: no two pools may share a baseDir
                  rule: self.filter(p, has(p.loopfile)).map(p, p.loopfile.baseDir).all(d,
                    self.filter(p, has(p.loopfile) && p.loopfile.baseDir == d).size()
                    == 1)
              zone:
                description: |-
                  Zone is an optional failure domain (rack, host group, AZ). When set,
                  the controller spreads a volume's replicas across distinct zones;
                  empty means unconstrained.
                maxLength: 63
                type: string
            required:
            - pools
            type: object
          status:
            description: |-
              MiroirNodeStatus is the pool capacity this node's agent publishes for
              capacity-aware placement and overcommit guardrails.
            properties:
              allocatedBytes:
                description: |-
                  AllocatedBytes is the pre-multi-pool twin of CapacityBytes.

                  Deprecated: superseded by Pools.
                format: int64
                type: integer
              capacityBytes:
                description: |-
                  CapacityBytes is the pre-multi-pool single-pool figure. Kept in the
                  schema so a mixed-version rollout (new controller, old agent) does
                  not prune the old agent's stats into "fresh but empty" — Pool()
                  folds these into the default pool entry. Never written by current
                  agents; drop after one release.

                  Deprecated: superseded by Pools.
                format: int64
                type: integer
              conditions:
                description: |-
                  Conditions follow the standard Kubernetes condition conventions;
                  PoolUsageHigh fires at the 80% data/metadata warn line (any pool).
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              drbdVersion:
                description: |-
                  DRBDVersion is the DRBD kernel module version the agent probed at
                  startup (e.g. "9.3.2"); absent on nodes without the module. The
                  module ships with the host, not the agent image, so this is the
                  per-node view that makes mixed clusters visible mid-upgrade.
                type: string
              metaUsedPercent:
                description: |-
                  MetaUsedPercent is the pre-multi-pool twin of CapacityBytes.

                  Deprecated: superseded by Pools.
                format: int32
                type: integer
              observedAt:
                description: |-
                  ObservedAt is when these figures were last sampled; the controller
                  ignores stats older than a few poll intervals as unknown.
                format: date-time
                type: string
              pools:
                description: Pools carries one capacity entry per storage pool on
                  this node.
                items:
                  description: |-
                    MiroirNodePoolStatus is one pool's capacity figures.
                    On a shared pool (e.g. ZFS shared with OpenEBS) the figures are
                    pool-level, so a co-tenant's growth correctly shrinks miroir's headroom.
                  properties:
                    allocatedBytes:
                      description: AllocatedBytes is the pool capacity currently used
                        (all tenants).
                      format: int64
                      type: integer
                    capacityBytes:
                      description: CapacityBytes is the total size of this node-local
                        pool.
                      format: int64
                      type: integer
                    message:
                      description: |-
                        Message carries the last stats-sampling error for this pool, if
                        any — a pool whose backend cannot be read stays visible instead of
                        silently dropping out of the list.
                      type: string
                    metaUsedPercent:
                      description: |-
                        MetaUsedPercent is the dm-thin metadata usage (lvmthin only; 0
                        otherwise), rounded — exhausting metadata wedges the pool
                        independently of data space.
                      format: int32
                      type: integer
                    name:
                      description: Name is the pool name from the node map.
                      type: string
                  required:
                  - name
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
