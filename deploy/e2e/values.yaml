# Driver-chart values for the single-node kind e2e (mise run test-e2e).
# Topology and classes come from the miroir-config chart (see
# config-values.yaml + the e2e-provision task's --set for the node).
image:
  repository: miroir-controller
  tag: e2e
  pullPolicy: IfNotPresent

agent:
  image:
    repository: miroir-agent
    tag: e2e
    pullPolicy: IfNotPresent
