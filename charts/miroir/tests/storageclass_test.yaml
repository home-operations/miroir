suite: test storageclass
templates:
  - storageclass.tpl
release:
  name: miroir
  namespace: miroir-system
tests:
  - it: creates nothing by default (both arrays empty)
    asserts:
      - hasDocuments:
          count: 0

  - it: renders one StorageClass per entry
    set:
      storageClasses:
        - name: miroir-local
          replicas: 1
          isDefault: true
        - name: miroir-replicated
          replicas: 2
          quorum: freeze
    asserts:
      - hasDocuments:
          count: 2
      - documentSelector: { path: metadata.name, value: miroir-local }
        isKind:
          of: StorageClass
      - documentSelector: { path: metadata.name, value: miroir-replicated }
        isKind:
          of: StorageClass

  - it: a replicas=1 entry is local — no quorum parameter, defaults applied
    set:
      storageClasses:
        - name: miroir-local
          replicas: 1
    documentSelector: { path: metadata.name, value: miroir-local }
    asserts:
      - equal:
          path: provisioner
          value: miroir.home-operations.com
      - equal:
          path: parameters["miroir.home-operations.com/replicas"]
          value: "1"
      - equal:
          path: parameters["csi.storage.k8s.io/fstype"]
          value: ext4 # default
      - equal:
          path: reclaimPolicy
          value: Delete # default
      - equal:
          path: metadata.annotations["storageclass.kubernetes.io/is-default-class"]
          value: "false" # default
      - notExists:
          path: parameters["miroir.home-operations.com/quorum"]

  - it: a replicas>1 entry is replicated — quorum defaults to freeze
    set:
      storageClasses:
        - name: r
          replicas: 3
    documentSelector: { path: metadata.name, value: r }
    asserts:
      - equal:
          path: parameters["miroir.home-operations.com/replicas"]
          value: "3"
      - equal:
          path: parameters["miroir.home-operations.com/quorum"]
          value: freeze

  - it: renders bitmapGranularity only when set on a replicated entry
    set:
      storageClasses:
        - name: coarse
          replicas: 2
          bitmapGranularity: 65536
        - name: plain
          replicas: 2
        - name: local
          replicas: 1
          bitmapGranularity: 65536 # local: parameter block not rendered
    asserts:
      - documentSelector: { path: metadata.name, value: coarse }
        equal:
          path: parameters["miroir.home-operations.com/bitmapGranularity"]
          value: "65536"
      - documentSelector: { path: metadata.name, value: plain }
        notExists:
          path: parameters["miroir.home-operations.com/bitmapGranularity"]
      - documentSelector: { path: metadata.name, value: local }
        notExists:
          path: parameters["miroir.home-operations.com/bitmapGranularity"]

  - it: honours per-entry overrides (isDefault, fsType, reclaimPolicy, quorum)
    set:
      storageClasses:
        - name: custom
          replicas: 2
          quorum: last-man-standing
          fsType: xfs
          reclaimPolicy: Retain
          isDefault: true
    documentSelector: { path: metadata.name, value: custom }
    asserts:
      - equal:
          path: metadata.annotations["storageclass.kubernetes.io/is-default-class"]
          value: "true"
      - equal:
          path: parameters["miroir.home-operations.com/quorum"]
          value: last-man-standing
      - equal:
          path: parameters["csi.storage.k8s.io/fstype"]
          value: xfs
      - equal:
          path: reclaimPolicy
          value: Retain

  - it: renders one VolumeSnapshotClass per entry with defaults
    set:
      volumeSnapshotClasses:
        - name: miroir-snap
    documentSelector: { path: metadata.name, value: miroir-snap }
    asserts:
      - isKind:
          of: VolumeSnapshotClass
      - equal:
          path: driver
          value: miroir.home-operations.com
      - equal:
          path: deletionPolicy
          value: Delete # default
      - notExists:
          path: metadata.annotations # isDefault false → no annotation

  - it: honours VolumeSnapshotClass deletionPolicy + is-default annotation
    set:
      volumeSnapshotClasses:
        - name: snap-retain
          deletionPolicy: Retain
          isDefault: true
    documentSelector: { path: metadata.name, value: snap-retain }
    asserts:
      - equal:
          path: deletionPolicy
          value: Retain
      - equal:
          path: metadata.annotations["snapshot.storage.kubernetes.io/is-default-class"]
          value: "true"

  - it: renders storage and snapshot classes together
    set:
      storageClasses:
        - name: only-local
          replicas: 1
      volumeSnapshotClasses:
        - name: miroir-snap
    asserts:
      - hasDocuments:
          count: 2
      - documentSelector: { path: metadata.name, value: only-local }
        isKind:
          of: StorageClass
      - documentSelector: { path: metadata.name, value: miroir-snap }
        isKind:
          of: VolumeSnapshotClass
