---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: homefsvolumes.homefs.io
spec:
  group: homefs.io
  names:
    kind: HomefsVolume
    listKind: HomefsVolumeList
    plural: homefsvolumes
    shortNames:
      - hfv
    singular: homefsvolume
  scope: Cluster
  versions:
    - additionalPrinterColumns:
        - jsonPath: .spec.sizeBytes
          name: Size
          type: integer
        - jsonPath: .spec.replicas[*].node
          name: Replicas
          priority: 1
          type: string
        - jsonPath: .status.phase
          name: Phase
          type: string
        - jsonPath: .metadata.creationTimestamp
          name: Age
          type: date
      name: v1alpha1
      schema:
        openAPIV3Schema:
          description: HomefsVolume is one provisioned volume (1:1 with a PV).
          properties:
            apiVersion:
              description: |-
                APIVersion defines the versioned schema of this representation of an object.
                Servers should convert recognized schemas to the latest internal value, and
                may reject unrecognized values.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
              type: string
            kind:
              description: |-
                Kind is a string value representing the REST resource this object represents.
                Servers may infer this from the endpoint the client submits requests to.
                Cannot be updated.
                In CamelCase.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
              type: string
            metadata:
              type: object
            spec:
              description: |-
                HomefsVolumeSpec is the desired state, written by the controller at
                CreateVolume time and reconciled by node agents.
              properties:
                drbd:
                  description: DRBD is set by the controller when len(Replicas) > 1.
                  properties:
                    minor:
                      description: Minor is the DRBD device minor number (device /dev/drbd<minor>).
                      format: int32
                      minimum: 0
                      type: integer
                    port:
                      description: Port is the TCP port for this resource's replication
                        links.
                      format: int32
                      maximum: 65535
                      minimum: 1024
                      type: integer
                  required:
                    - minor
                    - port
                  type: object
                quorumPolicy:
                  description: QuorumPolicy applies only when len(Replicas) > 1.
                  enum:
                    - last-man-standing
                    - freeze
                  type: string
                replicas:
                  description: |-
                    Replicas lists the placement of the volume: one entry for local
                    volumes, two or more for DRBD-replicated ones.
                  items:
                    description: |-
                      Replica is one placement of the volume's data — a DRBD peer when the
                      volume is replicated.
                    properties:
                      address:
                        description: |-
                          Address is the replication endpoint (host IP), from the node map.
                          Only set on replicated volumes.
                        type: string
                      backend:
                        description: Backend selects how the backing device is provisioned
                          on this node.
                        enum:
                          - lvmthin
                          - zfs
                        type: string
                      node:
                        description: Node is the Kubernetes node name hosting this replica.
                        type: string
                      nodeID:
                        description: |-
                          NodeID is the DRBD node id, assigned by the controller at creation
                          and stable for the volume's lifetime. Only set on replicated volumes.
                        format: int32
                        type: integer
                    required:
                      - backend
                      - node
                    type: object
                  minItems: 1
                  type: array
                sizeBytes:
                  description: SizeBytes is the provisioned (virtual, thin) size of
                    the volume.
                  format: int64
                  minimum: 1
                  type: integer
                source:
                  description: Source, if set, provisions content from a snapshot (CoW
                    clone).
                  properties:
                    snapshotName:
                      description: SnapshotName references a HomefsSnapshot by name.
                      type: string
                  required:
                    - snapshotName
                  type: object
              required:
                - replicas
                - sizeBytes
              type: object
            status:
              description: HomefsVolumeStatus is the observed state aggregated from
                node agents.
              properties:
                conditions:
                  description: Conditions follow the standard Kubernetes condition conventions.
                  items:
                    description: Condition contains details for one aspect of the current
                      state of this API Resource.
                    properties:
                      lastTransitionTime:
                        description: |-
                          lastTransitionTime is the last time the condition transitioned from one status to another.
                          This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                        format: date-time
                        type: string
                      message:
                        description: |-
                          message is a human readable message indicating details about the transition.
                          This may be an empty string.
                        maxLength: 32768
                        type: string
                      observedGeneration:
                        description: |-
                          observedGeneration represents the .metadata.generation that the condition was set based upon.
                          For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                          with respect to the current state of the instance.
                        format: int64
                        minimum: 0
                        type: integer
                      reason:
                        description: |-
                          reason contains a programmatic identifier indicating the reason for the condition's last transition.
                          Producers of specific condition types may define expected values and meanings for this field,
                          and whether the values are considered a guaranteed API.
                          The value should be a CamelCase string.
                          This field may not be empty.
                        maxLength: 1024
                        minLength: 1
                        pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                        type: string
                      status:
                        description: status of the condition, one of True, False, Unknown.
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                        type: string
                      type:
                        description: type of condition in CamelCase or in foo.example.com/CamelCase.
                        maxLength: 316
                        pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                        type: string
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    type: object
                  type: array
                perNode:
                  additionalProperties:
                    description: ReplicaStatus is the per-node observed state, written
                      by that node's agent.
                    properties:
                      connected:
                        description: |-
                          Connected is true when all replication links from this node are
                          established. Always true for unreplicated volumes.
                        type: boolean
                      deviceCreated:
                        description: DeviceCreated is true once the backing device exists
                          on the node.
                        type: boolean
                      devicePath:
                        description: |-
                          DevicePath is the node-local path pods attach to (backing device for
                          replicas:1; /dev/drbd<minor> when replicated).
                        type: string
                      diskState:
                        description: |-
                          DiskState is the DRBD disk state on this node (UpToDate,
                          Inconsistent, Outdated, Diskless, …). Empty for unreplicated volumes.
                        type: string
                      message:
                        description: Message carries the last reconcile error, if any.
                        type: string
                      sizeBytes:
                        description: |-
                          SizeBytes is the currently realized size on this node, used to
                          acknowledge expansion.
                        format: int64
                        type: integer
                      splitBrain:
                        description: |-
                          SplitBrain is true when this node's DRBD refused a reconnect after
                          detecting divergent data — operator intervention required.
                        type: boolean
                    type: object
                  description: PerNode maps node name to that agent's observed state.
                  type: object
                phase:
                  description: Phase summarizes the volume state for the controller
                    and humans.
                  type: string
              type: object
          required:
            - spec
          type: object
      served: true
      storage: true
      subresources:
        status: {}
