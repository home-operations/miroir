suite: test storageclass
templates:
  - storageclass.tpl
release:
  name: miroir
  namespace: miroir-system
tests:
  - it: renders both StorageClasses and the VolumeSnapshotClass with defaults
    asserts:
      - hasDocuments:
          count: 3
      - documentIndex: 0
        equal:
          path: kind
          value: StorageClass
      - documentIndex: 0
        equal:
          path: apiVersion
          value: storage.k8s.io/v1
      - documentIndex: 0
        equal:
          path: metadata.name
          value: miroir-local
      - documentIndex: 1
        equal:
          path: kind
          value: StorageClass
      - documentIndex: 1
        equal:
          path: apiVersion
          value: storage.k8s.io/v1
      - documentIndex: 1
        equal:
          path: metadata.name
          value: miroir-replicated
      - documentIndex: 2
        equal:
          path: kind
          value: VolumeSnapshotClass
      - documentIndex: 2
        equal:
          path: apiVersion
          value: snapshot.storage.k8s.io/v1
      - documentIndex: 2
        equal:
          path: metadata.name
          value: miroir-snap

  - it: miroir-local mirrors its values verbatim
    documentSelector:
      path: metadata.name
      value: miroir-local
    asserts:
      - equal:
          path: provisioner
          value: miroir.io
      - equal:
          path: volumeBindingMode
          value: WaitForFirstConsumer
      - equal:
          path: allowVolumeExpansion
          value: true
      - equal:
          path: reclaimPolicy
          value: Delete
      - equal:
          path: parameters["miroir.io/replicas"]
          value: "1"
      - equal:
          path: parameters["csi.storage.k8s.io/fstype"]
          value: ext4
      - equal:
          path: metadata.annotations["storageclass.kubernetes.io/is-default-class"]
          value: "false"

  - it: miroir-replicated hard-codes replicas=2 and exposes quorum
    documentSelector:
      path: metadata.name
      value: miroir-replicated
    asserts:
      - equal:
          path: parameters["miroir.io/replicas"]
          value: "2"
      - equal:
          path: parameters["miroir.io/quorum"]
          value: last-man-standing
      - equal:
          path: parameters["csi.storage.k8s.io/fstype"]
          value: ext4

  - it: miroir-snap is a Delete snapshot class bound to miroir.io
    documentSelector:
      path: metadata.name
      value: miroir-snap
    asserts:
      - equal:
          path: driver
          value: miroir.io
      - equal:
          path: deletionPolicy
          value: Delete

  - it: honours customised storageClass values
    set:
      storageClass:
        create: true
        name: custom-local
        isDefault: true
        fsType: xfs
        replicas: 3
        reclaimPolicy: Retain
    documentSelector:
      path: metadata.name
      value: custom-local
    asserts:
      - equal:
          path: kind
          value: StorageClass
      - equal:
          path: apiVersion
          value: storage.k8s.io/v1
      - equal:
          path: metadata.annotations["storageclass.kubernetes.io/is-default-class"]
          value: "true"
      - equal:
          path: parameters["miroir.io/replicas"]
          value: "3"
      - equal:
          path: parameters["csi.storage.k8s.io/fstype"]
          value: xfs
      - equal:
          path: reclaimPolicy
          value: Retain

  - it: honours the replicated quorum + name overrides
    set:
      replicatedStorageClass:
        create: true
        name: custom-replicated
        quorum: freeze
        fsType: zfs
    documentSelector:
      path: metadata.name
      value: custom-replicated
    asserts:
      - equal:
          path: kind
          value: StorageClass
      - equal:
          path: parameters["miroir.io/quorum"]
          value: freeze
      - equal:
          path: parameters["csi.storage.k8s.io/fstype"]
          value: zfs

  - it: drops miroir-local when storageClass.create is false
    set:
      storageClass.create: false
    asserts:
      - hasDocuments:
          count: 2
      - documentIndex: 0
        equal:
          path: metadata.name
          value: miroir-replicated
      - documentIndex: 1
        equal:
          path: metadata.name
          value: miroir-snap

  - it: drops miroir-replicated when replicatedStorageClass.create is false
    set:
      replicatedStorageClass.create: false
    asserts:
      - hasDocuments:
          count: 2
      - documentIndex: 0
        equal:
          path: metadata.name
          value: miroir-local
      - documentIndex: 1
        equal:
          path: metadata.name
          value: miroir-snap

  - it: drops miroir-snap when volumeSnapshotClass.create is false
    set:
      volumeSnapshotClass.create: false
    asserts:
      - hasDocuments:
          count: 2
      - documentIndex: 0
        equal:
          path: metadata.name
          value: miroir-local
      - documentIndex: 1
        equal:
          path: metadata.name
          value: miroir-replicated

  - it: emits nothing when every create flag is false
    set:
      storageClass.create: false
      replicatedStorageClass.create: false
      volumeSnapshotClass.create: false
    asserts:
      - hasDocuments:
          count: 0
