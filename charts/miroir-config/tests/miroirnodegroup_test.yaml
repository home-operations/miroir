suite: test miroirnodegroup
templates:
  - miroirnodegroup.tpl
release:
  name: miroir-config
  namespace: miroir-system
tests:
  - it: renders nothing by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders one MiroirNodeGroup per entry, spec verbatim
    set:
      nodeGroups:
        workers:
          spec:
            nodeSelector:
              matchLabels:
                storage.miroir.home-operations.com/class: nvme
            template:
              pools:
                - name: default
                  lvmthin:
                    device: /dev/disk/by-partlabel/r-miroir
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: MiroirNodeGroup
      - equal:
          path: metadata.name
          value: workers
      - equal:
          path: spec.nodeSelector.matchLabels["storage.miroir.home-operations.com/class"]
          value: nvme
      - equal:
          path: spec.template.pools[0].lvmthin.device
          value: /dev/disk/by-partlabel/r-miroir

  - it: fails on an unknown template field instead of letting the API server prune it
    set:
      nodeGroups:
        workers:
          spec:
            nodeSelector: {}
            template:
              pool: []
    asserts:
      - failedTemplate:
          errorMessage: "nodeGroups.workers.spec.template.pool: unknown field (the API server would silently drop it); valid fields: zone, autoEvict, pools"

  - it: fails without the spec wrapper
    set:
      nodeGroups:
        workers:
          nodeSelector: {}
    asserts:
      - failedTemplate:
          errorPattern: must be declared under

  # The deep backend-block check must cover group templates too — a typo
  # here lands on the whole fleet, not one node.
  - it: fails on an unknown backend-block field inside a group template
    set:
      nodeGroups:
        workers:
          spec:
            nodeSelector: {}
            template:
              pools:
                - name: default
                  lvmthin:
                    device: /dev/sdb
                    thinPoolSize: 400g
    asserts:
      - failedTemplate:
          errorMessage: "nodeGroups.workers.spec.template.pools[0].lvmthin.thinPoolSize: unknown field (the API server would silently drop it); valid fields: device, poolSize"

  # A pruned selector key would leave an empty selector, which matches
  # every node in the cluster.
  - it: fails on an unknown nodeSelector field
    set:
      nodeGroups:
        workers:
          spec:
            nodeSelector:
              matchlabels:
                storage.miroir.home-operations.com/class: nvme
            template:
              pools:
                - name: default
                  lvmthin: {}
    asserts:
      - failedTemplate:
          errorPattern: "nodeGroups.workers.spec.nodeSelector.matchlabels: unknown field"

  # The CRD categorically rejects template.address; the chart must say why
  # at render time instead of listing it as a valid field.
  - it: fails on template.address with the per-node-fact pointer
    set:
      nodeGroups:
        workers:
          spec:
            nodeSelector: {}
            template:
              address: 10.0.100.11
              pools:
                - name: default
                  lvmthin: {}
    asserts:
      - failedTemplate:
          errorPattern: annotate each Node with miroir.home-operations.com/address
