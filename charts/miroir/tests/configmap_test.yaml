suite: test configmap
templates:
  - configmap.tpl
release:
  name: miroir
  namespace: miroir-system
tests:
  - it: renders only the drbd ConfigMap (the topology is MiroirNode CRs)
    asserts:
      - hasDocuments:
          count: 1
      - documentIndex: 0
        equal:
          path: kind
          value: ConfigMap
      - documentIndex: 0
        equal:
          path: apiVersion
          value: v1
      - documentIndex: 0
        equal:
          path: metadata.name
          value: miroir-drbd-conf

  - it: keeps the drbd global config to usage-count no and an empty common{}
    documentIndex: 0
    asserts:
      - matchRegex:
          path: data["global_common.conf"]
          pattern: "usage-count no;"
      - matchRegex:
          path: data["global_common.conf"]
          pattern: "common \\{"
      - matchRegex:
          path: data["global_common.conf"]
          pattern: "handlers \\{\\}"
      # Default emits no bandwidth ceiling — the kernel controller adapts.
      - notMatchRegex:
          path: data["global_common.conf"]
          pattern: "c-max-rate"
      # on-io-error detach is the default: a dying disk degrades the leg
      # to Diskless instead of surfacing EIO into the pod.
      - matchRegex:
          path: data["global_common.conf"]
          pattern: "on-io-error detach;"
      # c-min-rate is defaulted so a degraded volume heals in hours, not
      # days, under application I/O.
      - matchRegex:
          path: data["global_common.conf"]
          pattern: "c-min-rate 10M;"
      # verify-alg is defaulted (crc32c is always present); free until a
      # verify runs.
      - matchRegex:
          path: data["global_common.conf"]
          pattern: "verify-alg crc32c;"

  - it: renders cluster-wide resync tuning into common{} when set
    set:
      drbd:
        onIoError: pass_on
        resync:
          planAhead: "20"
          maxRate: 720M
          minRate: 20M
        net:
          maxBuffers: "36864"
    documentIndex: 0
    asserts:
      - matchRegex:
          path: data["global_common.conf"]
          pattern: "c-plan-ahead 20;"
      - matchRegex:
          path: data["global_common.conf"]
          pattern: "c-max-rate 720M;"
      - matchRegex:
          path: data["global_common.conf"]
          pattern: "c-min-rate 20M;"
      - matchRegex:
          path: data["global_common.conf"]
          pattern: "max-buffers 36864;"
      - matchRegex:
          path: data["global_common.conf"]
          pattern: "on-io-error pass_on;"

  - it: renders discard granularity and verify-alg when set
    set:
      drbd:
        verify:
          algorithm: crc32c
        resync:
          discardGranularity: "65536"
    documentIndex: 0
    asserts:
      - matchRegex:
          path: data["global_common.conf"]
          pattern: "rs-discard-granularity 65536;"
      - matchRegex:
          path: data["global_common.conf"]
          pattern: "verify-alg crc32c;"

  - it: default emits no discard granularity (loopfile-unsafe, opt-in)
    documentIndex: 0
    asserts:
      - notMatchRegex:
          path: data["global_common.conf"]
          pattern: "rs-discard-granularity"

  - it: honours a non-default Release namespace
    release:
      name: miroir
      namespace: storage
    asserts:
      - documentIndex: 0
        equal:
          path: metadata.namespace
          value: storage

  - it: fails loudly when the pre-0.7 drbd.verifyAlg key is still set
    set:
      drbd:
        verifyAlg: crc32c
    asserts:
      - failedTemplate:
          errorMessage: "drbd.verifyAlg was renamed to drbd.verify.algorithm"

  - it: appends drbd.extraConfig lines inside the matching common{} sections
    set:
      drbd:
        extraConfig:
          handlers: |
            fence-peer "/usr/lib/drbd/crm-fence-peer.9.sh";
          disk: |
            read-balancing least-pending;
          net: |
            csums-alg crc32c;
            sndbuf-size 10M;
    documentIndex: 0
    asserts:
      - matchRegex:
          path: data["global_common.conf"]
          pattern: "handlers \\{\n        fence-peer"
      - matchRegex:
          path: data["global_common.conf"]
          pattern: "read-balancing least-pending;"
      - matchRegex:
          path: data["global_common.conf"]
          pattern: "csums-alg crc32c;\n        sndbuf-size 10M;"
      # Chart-rendered options keep their place in the same sections.
      - matchRegex:
          path: data["global_common.conf"]
          pattern: "on-io-error detach;"
      - matchRegex:
          path: data["global_common.conf"]
          pattern: "verify-alg crc32c;"
      # Untouched sections stay in their empty inline form.
      - matchRegex:
          path: data["global_common.conf"]
          pattern: "startup \\{\\}"

  - it: fails loudly when the pre-split nodes value is still set
    set:
      nodes:
        kharkiv:
          spec:
            pools: []
    asserts:
      - failedTemplate:
          errorPattern: moved to the miroir-config chart

  - it: fails loudly when the pre-split storageClasses value is still set
    set:
      storageClasses:
        - name: miroir-local
    asserts:
      - failedTemplate:
          errorPattern: moved to the miroir-config chart

  # Presence is the signal, not truthiness: an explicitly-empty leftover
  # is still a leftover. One test per key — the guard fails on the first
  # hit, so a combined test would only exercise one of them.
  - it: fails loudly when a pre-split map value is set but empty
    set:
      nodes: {}
    asserts:
      - failedTemplate:
          errorPattern: moved to the miroir-config chart

  - it: fails loudly when a pre-split list value is set but empty
    set:
      volumeSnapshotClasses: []
    asserts:
      - failedTemplate:
          errorPattern: moved to the miroir-config chart
