# Storage classes for the replicated (QEMU) e2e: plain manifests, exactly
# what the docs tell users to author. The topology (a MiroirNodeGroup)
# is applied by the e2e-replicated-provision task. The class names match
# test/conformance/testdriver.yaml (FromExistingClassName).
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: miroir-replicated
provisioner: miroir.home-operations.com
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
reclaimPolicy: Delete
parameters:
  miroir.home-operations.com/replicas: "2"
  csi.storage.k8s.io/fstype: ext4
---
apiVersion: snapshot.storage.k8s.io/v1
kind: VolumeSnapshotClass
metadata:
  name: miroir-snap
driver: miroir.home-operations.com
deletionPolicy: Delete
---
apiVersion: groupsnapshot.storage.k8s.io/v1beta2
kind: VolumeGroupSnapshotClass
metadata:
  name: miroir-group-snap
driver: miroir.home-operations.com
deletionPolicy: Delete
