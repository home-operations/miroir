# Driver definition for the miroir-local path (lvmthin, replicas:1), where volumes
# are pinned to their node — hence singleNodeVolume: true.
StorageClass:
  FromExistingClassName: miroir-local
SnapshotClass:
  FromExistingClassName: miroir-snap
DriverInfo:
  Name: miroir.home-operations.com
  SupportedSizeRange:
    Min: 1Gi
    Max: 10Gi
  SupportedFsType:
    ext4: {}
    xfs: {}
  SupportedMountOption:
    noatime: {}
  TopologyKeys:
    - miroir.home-operations.com/node
  Capabilities:
    persistence: true
    block: true
    exec: true
    fsGroup: true
    multipods: true
    controllerExpansion: true
    nodeExpansion: true
    onlineExpansion: true
    offlineExpansion: true
    snapshotDataSource: true
    pvcDataSource: true
    topology: true
    singleNodeVolume: true
    # RWX needs the replicated (DRBD) path; the local driver can't exercise it.
    RWX: false
    multiplePVsSameID: true
    readWriteOncePod: true
    capacity: true
