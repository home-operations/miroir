suite: test controller
templates:
  - controller.tpl
release:
  name: miroir
  namespace: miroir-system
tests:
  - it: renders a single-replica Deployment with all four containers
    documentIndex: 0
    asserts:
      - equal:
          path: kind
          value: Deployment
      - equal:
          path: apiVersion
          value: apps/v1
      - equal:
          path: metadata.name
          value: miroir-controller
      - equal:
          path: spec.replicas
          value: 1
      - equal:
          path: spec.strategy.type
          value: Recreate
      - equal:
          path: spec.template.spec.serviceAccountName
          value: miroir-controller
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 65532
      - equal:
          path: spec.template.spec.securityContext.seccompProfile.type
          value: RuntimeDefault
      - lengthEqual:
          path: spec.template.spec.containers
          count: 4
      - contains:
          any: true
          path: spec.template.spec.containers
          content:
            name: controller
      - contains:
          any: true
          path: spec.template.spec.containers
          content:
            name: csi-provisioner
      - contains:
          any: true
          path: spec.template.spec.containers
          content:
            name: csi-snapshotter
      - contains:
          any: true
          path: spec.template.spec.containers
          content:
            name: csi-resizer

  - it: controller container runs with image, mode=controller and a non-root securityContext
    documentIndex: 0
    asserts:
      - equal:
          path: spec.template.spec.containers[0].name
          value: controller
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ghcr.io/home-operations/miroir-controller:0.0.1"
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: IfNotPresent
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--mode=controller"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--csi-socket=/csi/csi.sock"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--auto-tie-breaker=true"
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop[0]
          value: ALL
      - lengthEqual:
          path: spec.template.spec.containers[0].ports
          count: 1
      - equal:
          path: spec.template.spec.containers[0].ports[0].name
          value: metrics
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8081
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: metrics
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: metrics

  - it: flows provisionTimeout into the controller args
    set:
      provisionTimeout: 90s
    documentIndex: 0
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--provision-timeout=90s"

  - it: autoTieBreaker=false opts out of tie-breaker placement
    set:
      autoTieBreaker: false
    documentIndex: 0
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--auto-tie-breaker=false"

  - it: each sidecar picks up its own image and timeout
    set:
      sidecars.provisioner.timeout: 75s
      sidecars.provisioner.image: registry.k8s.io/sig-storage/csi-provisioner:v9.9.9
      sidecars.snapshotter.timeout: 76s
      sidecars.snapshotter.image: registry.k8s.io/sig-storage/csi-snapshotter:v9.9.9
      sidecars.resizer.timeout: 77s
      sidecars.resizer.image: registry.k8s.io/sig-storage/csi-resizer:v9.9.9
    documentIndex: 0
    asserts:
      - contains:
          any: true
          path: spec.template.spec.containers
          content:
            name: csi-provisioner
            image: registry.k8s.io/sig-storage/csi-provisioner:v9.9.9
            args:
              - "--csi-address=/csi/csi.sock"
              - "--timeout=75s"
              - "--leader-election=false"
              - "--default-fstype=ext4"
              - "--extra-create-metadata"
      - contains:
          any: true
          path: spec.template.spec.containers
          content:
            name: csi-snapshotter
            image: registry.k8s.io/sig-storage/csi-snapshotter:v9.9.9
            args:
              - "--csi-address=/csi/csi.sock"
              - "--timeout=76s"
              - "--leader-election=false"
      - contains:
          any: true
          path: spec.template.spec.containers
          content:
            name: csi-resizer
            image: registry.k8s.io/sig-storage/csi-resizer:v9.9.9
            args:
              - "--csi-address=/csi/csi.sock"
              - "--timeout=77s"
              - "--leader-election=false"

  - it: renders no PodDisruptionBudget and no leader election by default
    asserts:
      - hasDocuments:
          count: 1
      - documentIndex: 0
        notContains:
          path: spec.template.spec.containers[0].args
          content: "--leader-elect=true"

  - it: replicaCount above 1 auto-enables leader election and RollingUpdate
    set:
      replicaCount: 3
    documentIndex: 0
    asserts:
      - equal:
          path: spec.replicas
          value: 3
      - equal:
          path: spec.strategy.type
          value: RollingUpdate
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--leader-elect=true"
      # release-scoped Lease name so two releases in one namespace never collide
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--leader-election-id=miroir-controller"
      - contains:
          path: spec.template.spec.containers[1].args
          content: "--leader-election=true"
      - contains:
          path: spec.template.spec.containers[2].args
          content: "--leader-election=true"
      - contains:
          path: spec.template.spec.containers[3].args
          content: "--leader-election=true"

  - it: leaderElection.enabled=false cannot switch election off above one replica
    set:
      replicaCount: 2
      leaderElection:
        enabled: false
    documentIndex: 0
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--leader-elect=true"
      - contains:
          path: spec.template.spec.containers[1].args
          content: "--leader-election=true"

  - it: leaderElection.enabled forces election at a single replica, without a PDB
    set:
      leaderElection:
        enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - documentIndex: 0
        equal:
          path: spec.replicas
          value: 1
      - documentIndex: 0
        equal:
          path: spec.strategy.type
          value: RollingUpdate
      - documentIndex: 0
        contains:
          path: spec.template.spec.containers[0].args
          content: "--leader-elect=true"

  - it: leaderElection.id overrides the Lease name
    set:
      replicaCount: 2
      leaderElection:
        id: my-lease
    documentIndex: 0
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--leader-election-id=my-lease"

  - it: replicaCount above 1 adds a PodDisruptionBudget covering the controller
    set:
      replicaCount: 2
    asserts:
      - hasDocuments:
          count: 2
      - documentIndex: 1
        equal:
          path: kind
          value: PodDisruptionBudget
      - documentIndex: 1
        equal:
          path: metadata.name
          value: miroir-controller
      - documentIndex: 1
        equal:
          path: spec.maxUnavailable
          value: 1
      - documentIndex: 1
        equal:
          path: spec.selector.matchLabels["app.kubernetes.io/component"]
          value: controller

  - it: the controller pod is cluster-critical by default
    documentIndex: 0
    asserts:
      - equal:
          path: spec.template.spec.priorityClassName
          value: system-cluster-critical

  - it: respects a custom image repository + tag
    set:
      image:
        repository: registry.example.com/miroir
        tag: 1.2.3
        pullPolicy: Always
    documentIndex: 0
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "registry.example.com/miroir:1.2.3"
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always

  - it: pins the image by digest when set, overriding the tag
    set:
      image:
        tag: 1.2.3
        digest: sha256:abc123
    documentIndex: 0
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ghcr.io/home-operations/miroir-controller@sha256:abc123"

  - it: respects a non-default Release namespace
    release:
      name: miroir
      namespace: storage
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.namespace
          value: storage

  - it: shares a CSI socketDir across the pod (no topology ConfigMap)
    documentIndex: 0
    asserts:
      - contains:
          any: true
          path: spec.template.spec.volumes
          content:
            name: socket-dir
            emptyDir: {}
      - lengthEqual:
          path: spec.template.spec.volumes
          count: 1

  - it: applies global pull secrets, scheduling, and common labels
    set:
      global:
        imagePullSecrets:
          - name: ghcr-pull
        nodeSelector:
          kubernetes.io/arch: amd64
        tolerations:
          - key: dedicated
            operator: Equal
            value: storage
            effect: NoSchedule
        commonLabels:
          team: platform
    documentIndex: 0
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: ghcr-pull
      - equal:
          path: spec.template.spec.nodeSelector["kubernetes.io/arch"]
          value: amd64
      # Global tolerations append after the built-in unreachable toleration.
      - equal:
          path: spec.template.spec.tolerations[1].key
          value: dedicated
      - equal:
          path: metadata.labels.team
          value: platform

  - it: renders no scheduling or pull-secret fields by default
    documentIndex: 0
    asserts:
      - notExists:
          path: spec.template.spec.imagePullSecrets
      - notExists:
          path: spec.template.spec.nodeSelector
      # Only the built-in unreachable toleration.
      - lengthEqual:
          path: spec.template.spec.tolerations
          count: 1

  - it: tolerates an unreachable node for 5s so a dead node reschedules fast
    documentIndex: 0
    asserts:
      - contains:
          path: spec.template.spec.tolerations
          content:
            key: node.kubernetes.io/unreachable
            operator: Exists
            effect: NoExecute
            tolerationSeconds: 5

  - it: honours unreachableNodeTolerationSeconds
    set:
      unreachableNodeTolerationSeconds: 300
    documentIndex: 0
    asserts:
      - equal:
          path: spec.template.spec.tolerations[0].tolerationSeconds
          value: 300

  - it: sidecar resources come from values
    set:
      sidecars.provisioner.resources:
        requests: { cpu: 50m, memory: 256Mi }
        limits: { memory: 512Mi }
    documentIndex: 0
    asserts:
      - equal:
          path: spec.template.spec.containers[?(@.name == "csi-provisioner")].resources.limits.memory
          value: 512Mi
      # The others keep their defaults.
      - equal:
          path: spec.template.spec.containers[?(@.name == "csi-resizer")].resources.limits.memory
          value: 128Mi
      - equal:
          path: spec.template.spec.containers[?(@.name == "csi-snapshotter")].resources.requests.cpu
          value: 10m

  - it: honours fullnameOverride and nameOverride
    set:
      fullnameOverride: replicator
      nameOverride: mir
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.name
          value: replicator-controller
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: mir

  - it: wires logging, pod metadata, and extra args/env
    set:
      logging:
        level: debug
        format: console
      podLabels:
        sidecar.istio.io/inject: "false"
      podAnnotations:
        reloader.stakater.com/auto: "true"
      extraArgs:
        - --leak-check=true
      extraEnv:
        - name: GOMEMLIMIT
          value: 100MiB
    documentIndex: 0
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --zap-log-level=debug
      - contains:
          path: spec.template.spec.containers[0].args
          content: --zap-encoder=console
      - contains:
          path: spec.template.spec.containers[0].args
          content: --leak-check=true
      # POD_NAMESPACE is always env[0] (the controller creates gateway
      # workloads in its own namespace); extra env follows it.
      - equal:
          path: spec.template.spec.containers[0].env[0].name
          value: POD_NAMESPACE
      - equal:
          path: spec.template.spec.containers[0].env[1].name
          value: GOMEMLIMIT
      - equal:
          path: spec.template.metadata.labels["sidecar.istio.io/inject"]
          value: "false"
      - equal:
          path: spec.template.metadata.annotations["reloader.stakater.com/auto"]
          value: "true"

  - it: stamps no topology checksum (placement is watch-driven)
    documentIndex: 0
    asserts:
      - notExists:
          path: spec.template.metadata.annotations

  - it: leaves the provisioner without capacity flags by default
    documentIndex: 0
    asserts:
      - notContains:
          path: spec.template.spec.containers[1].args
          content: --enable-capacity
  - it: wires the provisioner capacity feature when storageCapacity is enabled
    documentIndex: 0
    set:
      storageCapacity:
        enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[1].name
          value: csi-provisioner
      - contains:
          path: spec.template.spec.containers[1].args
          content: --enable-capacity
      - contains:
          path: spec.template.spec.containers[1].args
          content: --capacity-ownerref-level=2
      - equal:
          path: spec.template.spec.containers[1].env[0].name
          value: NAMESPACE
      - equal:
          path: spec.template.spec.containers[1].env[1].name
          value: POD_NAME

  - it: omits auto-diskful-after by default
    documentIndex: 0
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --auto-diskful-after=10m
  - it: passes auto-diskful-after when autoDiskfulAfter is set
    documentIndex: 0
    set:
      autoDiskfulAfter: 10m
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --auto-diskful-after=10m
  - it: omits auto-evict-after by default
    documentIndex: 0
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --auto-evict-after=60m
  - it: passes auto-evict-after when autoEvictAfter is set
    documentIndex: 0
    set:
      autoEvictAfter: 60m
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --auto-evict-after=60m
  - it: withholds the gateway args by default (RWX is opt-in)
    documentIndex: 0
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --gateway-image=ghcr.io/home-operations/miroir-gateway:0.0.1
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --gateway-service-account=miroir-gateway

  # RWX: the controller is told which gateway image and ServiceAccount
  # to spawn per-volume NFS gateways with.
  - it: passes the gateway args when the gateway is enabled
    documentIndex: 0
    set:
      gateway.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --gateway-image=ghcr.io/home-operations/miroir-gateway:0.0.1
      - contains:
          path: spec.template.spec.containers[0].args
          content: --gateway-service-account=miroir-gateway
