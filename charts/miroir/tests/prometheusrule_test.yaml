suite: prometheusrule
templates:
  - prometheusrule.tpl
release:
  name: miroir
  namespace: miroir-system
tests:
  - it: should not create a PrometheusRule by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should create a PrometheusRule when enabled
    set:
      monitoring.prometheusRule.enabled: true
    asserts:
      - isKind:
          of: PrometheusRule
      - equal:
          path: metadata.name
          value: miroir
      - equal:
          path: metadata.namespace
          value: miroir-system

  - it: should have the volume, pool, export and agent rule groups with the gateway enabled
    set:
      monitoring.prometheusRule.enabled: true
      gateway.enabled: true
    asserts:
      - lengthEqual:
          path: spec.groups
          count: 4
      - equal:
          path: spec.groups[0].name
          value: miroir.volumes
      - lengthEqual:
          path: spec.groups[0].rules
          count: 9
      - equal:
          path: spec.groups[1].name
          value: miroir.pools
      - lengthEqual:
          path: spec.groups[1].rules
          count: 2
      - equal:
          path: spec.groups[2].name
          value: miroir.exports
      - equal:
          path: spec.groups[2].rules[0].alert
          value: MiroirExportUnavailable
      - equal:
          path: spec.groups[2].rules[0].labels.severity
          value: critical
      - equal:
          path: spec.groups[3].name
          value: miroir.agents
      - equal:
          path: spec.groups[3].rules[0].alert
          value: MiroirAgentDown
      - equal:
          path: spec.groups[3].rules[0].labels.severity
          value: critical
      - equal:
          path: spec.groups[3].rules[0].expr
          value: up{container="agent", namespace="miroir-system"} == 0

  - it: should omit the export rule group by default (RWX is opt-in)
    set:
      monitoring.prometheusRule.enabled: true
    asserts:
      - lengthEqual:
          path: spec.groups
          count: 3
      - equal:
          path: spec.groups[2].name
          value: miroir.agents

  - it: should render the verify staleness rule only with a verify schedule
    set:
      monitoring.prometheusRule.enabled: true
      drbd.verify.schedule: "0 3 * * 0"
      monitoring.prometheusRule.verifyStaleDays: 9
    asserts:
      - lengthEqual:
          path: spec.groups[0].rules
          count: 10
      - equal:
          path: spec.groups[0].rules[9].alert
          value: MiroirVolumeVerifyStale
      - equal:
          path: spec.groups[0].rules[9].labels.severity
          value: warning
      - equal:
          path: spec.groups[0].rules[9].expr
          value: time() - miroir_volume_verify_last_timestamp_seconds > 9 * 86400

  - it: should mark IO-freezing conditions critical
    set:
      monitoring.prometheusRule.enabled: true
    asserts:
      - equal:
          path: spec.groups[0].rules[0].alert
          value: MiroirVolumeSplitBrain
      - equal:
          path: spec.groups[0].rules[0].labels.severity
          value: critical
      - equal:
          path: spec.groups[0].rules[1].alert
          value: MiroirVolumeQuorumLost
      - equal:
          path: spec.groups[0].rules[1].labels.severity
          value: critical
      - equal:
          path: spec.groups[0].rules[3].alert
          value: MiroirVolumeTeardownWedged
      - equal:
          path: spec.groups[0].rules[3].labels.severity
          value: critical
      - equal:
          path: spec.groups[0].rules[3].expr
          value: miroir_volume_wedged == 1
      - equal:
          path: spec.groups[0].rules[4].alert
          value: MiroirVolumeDiskFailed
      - equal:
          path: spec.groups[0].rules[4].labels.severity
          value: warning

  - it: should add extra labels to the PrometheusRule
    set:
      monitoring.prometheusRule.enabled: true
      monitoring.prometheusRule.labels:
        role: alert-rules
    asserts:
      - equal:
          path: metadata.labels.role
          value: alert-rules

  - it: should add additional labels and annotations to every rule
    set:
      monitoring.prometheusRule.enabled: true
      monitoring.prometheusRule.additionalRuleLabels:
        team: platform
      monitoring.prometheusRule.additionalRuleAnnotations:
        runbook_url: https://example.com/runbooks/miroir
    asserts:
      - equal:
          path: spec.groups[0].rules[0].labels.team
          value: platform
      - equal:
          path: spec.groups[0].rules[0].labels.severity
          value: critical
      - equal:
          path: spec.groups[0].rules[0].annotations.runbook_url
          value: https://example.com/runbooks/miroir
      - equal:
          path: spec.groups[1].rules[1].labels.team
          value: platform
      - equal:
          path: spec.groups[1].rules[1].annotations.runbook_url
          value: https://example.com/runbooks/miroir

  - it: an override can disable a single rule
    set:
      monitoring.prometheusRule.enabled: true
      monitoring.prometheusRule.overrides:
        MiroirVolumeOutOfSync: { disabled: true }
    asserts:
      - lengthEqual:
          path: spec.groups[0].rules
          count: 8
      # RemoteConsumer moves up into OutOfSync's slot.
      - equal:
          path: spec.groups[0].rules[7].alert
          value: MiroirVolumeRemoteConsumer

  - it: an override can replace a rule's wait period and reclassify severity
    set:
      monitoring.prometheusRule.enabled: true
      monitoring.prometheusRule.additionalRuleLabels:
        team: platform
      monitoring.prometheusRule.overrides:
        MiroirVolumeDisconnected:
          for: 30m
          labels: { severity: info }
    asserts:
      - equal:
          path: spec.groups[0].rules[6].alert
          value: MiroirVolumeDisconnected
      - equal:
          path: spec.groups[0].rules[6].for
          value: 30m
      - equal:
          path: spec.groups[0].rules[6].labels.severity
          value: info
      # additionalRuleLabels still apply alongside the override.
      - equal:
          path: spec.groups[0].rules[6].labels.team
          value: platform
      # Other rules keep their defaults.
      - equal:
          path: spec.groups[0].rules[0].for
          value: 1m
      - equal:
          path: spec.groups[0].rules[0].labels.severity
          value: critical

  - it: disabling a group's only rule drops the whole group
    set:
      monitoring.prometheusRule.enabled: true
      monitoring.prometheusRule.overrides:
        MiroirAgentDown: { disabled: true }
    asserts:
      - lengthEqual:
          path: spec.groups
          count: 2
      - equal:
          path: spec.groups[0].name
          value: miroir.volumes
      - equal:
          path: spec.groups[1].name
          value: miroir.pools
