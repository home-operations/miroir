suite: test agent
templates:
  - agent.tpl
release:
  name: miroir
  namespace: miroir-system
tests:
  - it: renders a DaemonSet with the agent + node-driver-registrar
    set:
      nodes:
        node-a:
          pools:
            default:
              backend: lvmthin
              device: /dev/disk/by-partlabel/r-miroir
    asserts:
      - hasDocuments:
          count: 1
      - documentIndex: 0
        equal:
          path: kind
          value: DaemonSet
      - documentIndex: 0
        equal:
          path: apiVersion
          value: apps/v1
      - documentIndex: 0
        equal:
          path: metadata.name
          value: miroir-agent
      - documentIndex: 0
        lengthEqual:
          path: spec.template.spec.containers
          count: 2
      - documentIndex: 0
        equal:
          path: spec.template.spec.containers[0].name
          value: agent
      - documentIndex: 0
        equal:
          path: spec.template.spec.containers[1].name
          value: node-driver-registrar

  - it: agent container runs with mode=agent and a privileged securityContext
    set:
      nodes:
        node-a:
          pools:
            default:
              backend: lvmthin
              device: /dev/disk/by-partlabel/r-miroir
    documentIndex: 0
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ghcr.io/home-operations/miroir-agent:0.0.1"
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: IfNotPresent
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--mode=agent"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--csi-socket=/csi/csi.sock"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--nodes-config=/etc/miroir/nodes.yaml"
      - equal:
          path: spec.template.spec.containers[0].securityContext.privileged
          value: true
      - lengthEqual:
          path: spec.template.spec.containers[0].ports
          count: 1
      - equal:
          path: spec.template.spec.containers[0].ports[0].name
          value: metrics
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 9810
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: metrics
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: metrics

  - it: pod runs with hostNetwork, hostPID and ClusterFirstWithHostNet
    set:
      nodes:
        node-a:
          pools:
            default:
              backend: lvmthin
              device: /dev/disk/by-partlabel/r-miroir
    documentIndex: 0
    asserts:
      - equal:
          path: spec.template.spec.hostNetwork
          value: true
      - equal:
          path: spec.template.spec.hostPID
          value: true
      - equal:
          path: spec.template.spec.dnsPolicy
          value: ClusterFirstWithHostNet
      - equal:
          path: spec.template.spec.terminationGracePeriodSeconds
          value: 60
      - equal:
          path: spec.template.spec.priorityClassName
          value: system-node-critical
      - lengthEqual:
          path: spec.template.spec.tolerations
          count: 1
      - contains:
          any: true
          path: spec.template.spec.tolerations
          content:
            operator: Exists

  - it: binds /var/lib/kubelet at kubeletDir with Bidirectional propagation
    set:
      agent.kubeletDir: /var/snap/kubelet
      nodes:
        node-a:
          pools:
            default:
              backend: lvmthin
              device: /dev/disk/by-partlabel/r-miroir
    documentIndex: 0
    asserts:
      - contains:
          any: true
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: kubelet
            mountPath: /var/snap/kubelet
            mountPropagation: Bidirectional
      - contains:
          any: true
          path: spec.template.spec.volumes
          content:
            name: kubelet
            hostPath:
              path: /var/snap/kubelet
              type: Directory

  - it: with no loopfile nodes, no loopfile mount or volume is rendered
    set:
      nodes:
        node-a:
          pools:
            default:
              backend: lvmthin
              device: /dev/disk/by-partlabel/r-miroir
        node-b:
          pools:
            default:
              backend: zfs
              zfsDataset: data-pool/miroir
    documentIndex: 0
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers[0].volumeMounts
          count: 9
      - lengthEqual:
          path: spec.template.spec.volumes
          count: 10

  - it: adds one identity-mounted loopfile mount and hostPath volume per baseDir
    set:
      nodes:
        node-a:
          pools:
            default:
              backend: lvmthin
              device: /dev/disk/by-partlabel/r-miroir
        node-b:
          pools:
            default:
              backend: zfs
              zfsDataset: data-pool/miroir
        node-c:
          pools:
            default:
              backend: loopfile
              baseDir: /var/lib/miroir
        backup:
          pools:
            default:
              backend: loopfile
              baseDir: /srv/miroir
    documentIndex: 0
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers[0].volumeMounts
          count: 11
      - lengthEqual:
          path: spec.template.spec.volumes
          count: 12
      - contains:
          any: true
          path: spec.template.spec.containers[0].volumeMounts
          content:
            mountPath: /var/lib/miroir
      - contains:
          any: true
          path: spec.template.spec.containers[0].volumeMounts
          content:
            mountPath: /srv/miroir
      - contains:
          any: true
          path: spec.template.spec.volumes
          content:
            hostPath:
              path: /var/lib/miroir
              type: DirectoryOrCreate
      - contains:
          any: true
          path: spec.template.spec.volumes
          content:
            hostPath:
              path: /srv/miroir
              type: DirectoryOrCreate

  - it: dedups loopfile mounts when two nodes share a baseDir
    set:
      nodes:
        a:
          pools:
            default:
              backend: loopfile
              baseDir: /var/lib/miroir
        b:
          pools:
            default:
              backend: loopfile
              baseDir: /var/lib/miroir
    documentIndex: 0
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers[0].volumeMounts
          count: 10
      - lengthEqual:
          path: spec.template.spec.volumes
          count: 11
      - contains:
          any: true
          path: spec.template.spec.containers[0].volumeMounts
          content:
            mountPath: /var/lib/miroir
      - contains:
          any: true
          path: spec.template.spec.volumes
          content:
            hostPath:
              path: /var/lib/miroir
              type: DirectoryOrCreate

  - it: pins the agent image by digest when set, overriding the tag
    set:
      nodes:
        node-a:
          pools:
            default:
              backend: lvmthin
              device: /dev/disk/by-partlabel/r-miroir
      agent:
        image:
          tag: 1.2.3
          digest: sha256:def456
    documentIndex: 0
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ghcr.io/home-operations/miroir-agent@sha256:def456"

  - it: applies global pull secrets but not global scheduling (agent runs everywhere)
    set:
      nodes:
        node-a:
          pools:
            default:
              backend: lvmthin
              device: /dev/disk/by-partlabel/r-miroir
      global:
        imagePullSecrets:
          - name: ghcr-pull
        nodeSelector:
          kubernetes.io/arch: amd64
    documentIndex: 0
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: ghcr-pull
      - notExists:
          path: spec.template.spec.nodeSelector

  - it: wires agent pod metadata and extra args/env after NODE_NAME
    set:
      nodes:
        node-a:
          pools:
            default:
              backend: lvmthin
              device: /dev/disk/by-partlabel/r-miroir
      agent:
        podAnnotations:
          reloader.stakater.com/auto: "true"
        extraArgs:
          - --drbd-poll-interval=10s
        extraEnv:
          - name: GOMEMLIMIT
            value: 100MiB
    documentIndex: 0
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --drbd-poll-interval=10s
      - equal:
          path: spec.template.spec.containers[0].env[0].name
          value: NODE_NAME
      - equal:
          path: spec.template.spec.containers[0].env[1].name
          value: GOMEMLIMIT
      - equal:
          path: spec.template.metadata.annotations["reloader.stakater.com/auto"]
          value: "true"

  - it: omits --verify-schedule by default
    set:
      nodes:
        node-a:
          pools:
            default:
              backend: lvmthin
              device: /dev/disk/by-partlabel/r-miroir
    documentIndex: 0
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --verify-schedule=0 5 * * 0

  - it: passes --verify-schedule when a schedule is set
    set:
      nodes:
        node-a:
          pools:
            default:
              backend: lvmthin
              device: /dev/disk/by-partlabel/r-miroir
      drbd:
        verify:
          schedule: "0 5 * * 0"
    documentIndex: 0
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --verify-schedule=0 5 * * 0

  - it: omits --verify-schedule while suspended
    set:
      nodes:
        node-a:
          pools:
            default:
              backend: lvmthin
              device: /dev/disk/by-partlabel/r-miroir
      drbd:
        verify:
          schedule: "0 5 * * 0"
          suspend: true
    documentIndex: 0
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --verify-schedule=0 5 * * 0

  - it: fails when a verify schedule is set without an algorithm
    set:
      nodes:
        node-a:
          pools:
            default:
              backend: lvmthin
              device: /dev/disk/by-partlabel/r-miroir
      drbd:
        verify:
          algorithm: ""
          schedule: "0 5 * * 0"
    asserts:
      - failedTemplate:
          errorMessage: "drbd.verify.schedule requires drbd.verify.algorithm — a scheduled verify is meaningless without an arming verify-alg"
